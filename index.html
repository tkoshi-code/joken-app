    ③ 新しい節が出たらHPからもう一度全体をコピーして<b>「全節を上書き」</b>で取り込み直すのが確実です<br><br>
    ③' <b>当日のXの結果は画像で届きます</b>。2通りの取り込み方があります:<br>
    ・画像の文字をスマホの<b>テキスト認識でコピー</b>(iPhone: 写真を長押しして文字選択 / Android: Googleレンズ)→「節を追加」で貼り付け。X形式の行(ポイント・各回戦・節TOTAL・開始時点)は自動判別して節TOTALだけを取り込みます<br>
    ・または<b>「✏️ 節を手入力」</b>: 取り込み済みの名前一覧が並ぶので、画像を見ながら節ポイントの数字だけ入力(空欄=0)。間違えたら「最新節を削除」でやり直し<br>
    いずれも速報用なので、後日HPが更新されたら「全節を上書き」で正確な値に置き換えるのがおすすめです<br><br>
    ④ 設定の3ライン(2段階昇級/昇級/残留の順位)を入れると、自分との差・圏内の色分け・グラフの破線が出ます<br><br>
    ⑤ 推移グラフの比較相手は最大4人。「プレイヤー帳に追加」ボタンで、選んだ相手を対局相手として登録できます
    </div>
  </div>
  <div class="card"><h2>📏 ボーダー比較</h2>
    <div class="s">自分の現在トータルを入力し、ボーダー想定値を複数登録すると(楽観/悲観など)、それぞれについて「1着なら素点○○以上」の表が出ます。転記モード対応。</div>
  </div>
  <div class="card"><h2>📅🎬🀄 実力向上・予定(ホームのメニューから)</h2>
    <div class="s">
    <b>スケジュール</b>: 対局やイベントの予定を追加。大会(リーグの複数開催日を含む)の日程は自動で一覧に出ます。<br><br>
    <b>動画ストック</b>: 見た動画・見たい動画をURL付きで蓄積。「URLから取得」でタイトルが自動入力され、タグと学びメモを残せます。<br><br>
    <b>局面メモ</b>: 気になった牌姿をパレット(または「234m567p88s東東」の記法)で入力し、状況・論点と一緒に保存。<b>「📤 画像にして共有」</b>で1枚のPNGになり、LINEやXでそのまま人に聞けます。赤5は各色の「赤」ボタン(記法は0m/0p/0s)。
    </div>
  </div>
  <div class="card"><h2>💾 データとバックアップ</h2>
    <div class="s">
    データはこの端末のブラウザ内にだけ保存されます(サーバー送信なし)。<br><br>
    <b>節や大会が終わるごとに「設定 → バックアップ(JSON書き出し)」を推奨</b>。機種変更時はそのJSONを新端末で「復元」してください。<br><br>
    アプリは一度開けばオフラインでも動作します。オンラインで開けば自動で最新版になります。
    </div>
  </div>`;
}

/* ================= オーラス判定(入力画面) ================= */
function vFinal(){
  const e = ev(); const pr = preset(e.presetId);
  if(!e.finalHand) e.finalHand = {order:e.playerIds.slice(), raws:['','','',''], kyotaku:0, honba:0, dealer:3, target:e.passCount};
  const f = e.finalHand;
  const rows = [0,1,2,3].map(i=>{
    const opts = e.playerIds.map(pid=>`<option value="${pid}" ${pid===f.order[i]?'selected':''}>${esc(pname(pid))}</option>`).join('');
    return `<div class="row" style="margin-top:6px">
      <select id="fh_p${i}" class="fhsel" style="flex:1.2">${opts}</select>
      <input type="number" id="fh_v${i}" class="fhnum" inputmode="numeric" step="100" placeholder="現在素点" value="${f.raws[i]??''}">
      <button class="small secondary" data-act="fhsign" data-i="${i}" style="flex:0 0 40px;width:auto;margin:0;padding:6px 0">±</button>
    </div>`;
  }).join('');
  const dOpts = [0,1,2,3].map(i=>`<option value="${i}" ${i===Number(f.dealer)?'selected':''}>${esc(pname(f.order[i]))}</option>`).join('');
  return `<div class="card">
    <h2>最終局の状況 <span class="badge">${esc(pr.name)}</span></h2>
    <div class="cond-note">上から起家→南→西→北(開局時の席順)。この局開始時点の持ち点を入力。
    リーチ者は1,000点引いた持ち点にして、その分を供託に足してください。南4局なら親は通常4番目です。</div>
    ${rows}
    <div class="row" style="margin-top:8px">
      <div style="flex:1"><label>供託(点)</label><input type="number" id="fh_kyo" class="fhnum" inputmode="numeric" step="1000" value="${f.kyotaku||0}"></div>
      <div style="flex:0.7"><label>本場</label><input type="number" id="fh_honba" class="fhnum" inputmode="numeric" step="1" value="${f.honba||0}"></div>
      <div style="flex:1.2"><label>親</label><select id="fh_dealer" class="fhsel">${dOpts}</select></div>
    </div>
  </div>
  <div id="fh_out">${finalResults(e)}</div>
  <button class="primary no-copy" data-act="copyMode">📝 転記モード(手書き用表示)</button>`;
}
function readFinal(){
  const e = ev(); const f = e.finalHand;
  f.order   = [0,1,2,3].map(i=>document.getElementById('fh_p'+i).value);
  f.raws    = [0,1,2,3].map(i=>document.getElementById('fh_v'+i).value);
  f.kyotaku = document.getElementById('fh_kyo').value;
  f.honba   = document.getElementById('fh_honba').value;
  f.dealer  = document.getElementById('fh_dealer').value;
  save();
}
function refreshFinalOut(){
  document.getElementById('fh_out').innerHTML = finalResults(ev());
  bind();
}

/* ================= イベントバインド ================= */
function bind(){
  document.querySelectorAll('.fhnum').forEach(el=> el.onchange = ()=>{ readFinal(); refreshFinalOut(); });
  document.querySelectorAll('.fhsel').forEach(el=> el.onchange = ()=>{ readFinal(); render(); });
  document.querySelectorAll('.seg').forEach(seg=>{
    seg.querySelectorAll('button').forEach(b=> b.onclick = ()=>{
      seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      if(seg.id==='f_mode'){
        document.getElementById('tourOpts').style.display   = b.dataset.m==='tournament' ? '' : 'none';
        document.getElementById('leagueOpts').style.display = b.dataset.m==='league' ? '' : 'none';
        document.getElementById('tableOpts').style.display  = b.dataset.m==='table' ? '' : 'none';
        document.getElementById('borderOpts').style.display = b.dataset.m==='border' ? '' : 'none';
        // 区分の既定値: 対局記録/順位表→リーグ、トーナメント→ワンデー
        const kd = {tournament:'oneday', league:'league', table:'league', border:'oneday'}[b.dataset.m];
        document.querySelectorAll('#f_kind button').forEach(x=>x.classList.toggle('on', x.dataset.m===kd));
      }
      if(seg.id==='sch_mode'){ view.calMode = b.dataset.m; render(); }
      if(seg.id==='sch_src'){ view.fsrc = b.dataset.m; render(); }
      if(seg.id==='ee_kind'){
        document.getElementById('ee_date_one').style.display    = b.dataset.m==='league' ? 'none' : '';
        document.getElementById('ee_dates_league').style.display = b.dataset.m==='league' ? '' : 'none';
      }
      if(seg.id==='g_type'){ const e=ev(); const g=e.games.find(g=>g.round===view.round);
        // 切替時に入力タイプだけ変えて再描画
        if(g) upsertGame(e, {...g, inputType:b.dataset.m});
        else { const ng = defaultGame(e, view.round); ng.inputType = b.dataset.m; e.games.push(ng); }
        render();
      }
      if(seg.id==='mg_type'){ readMG(); view.draft.inputType = b.dataset.m; render(); }
      if(seg.id==='mg_scope'){ readMG(); view.draft.solo = b.dataset.m==='solo'; render(); }
    });
  });
  [0,1,2,3].forEach(i=>{
    const s = document.getElementById('f_p'+i);
    if(s) s.onchange = ()=>{ if(s.value==='__new__') quickAddPlayer(s); else refreshSelf(); };
    const gs = document.getElementById('g_p'+i);
    if(gs && gs.querySelector('option[value="__new__"]')) gs.onchange = ()=>{ if(gs.value==='__new__') quickAddPlayer(gs); };
    const ms = document.getElementById('mg_p'+i);
    if(ms) ms.onchange = ()=>{ if(ms.value==='__new__') quickAddPlayer(ms); };
  });
  document.querySelectorAll('.pal').forEach(b=> b.onclick = ()=>{
    const tgt = document.getElementById(window._sitT==='sit_dora' ? 'sit_dora' : 'sit_hand');
    if(b.dataset.t==='del'){ const ts = parseTiles(tgt.value); ts.pop(); tgt.value = tilesToStr(ts); }
    else tgt.value += b.dataset.t;
    document.getElementById('sit_prev').innerHTML = sitPreview();
  });
  document.querySelectorAll('.sitfield').forEach(el=>{
    el.onfocus = ()=>{ window._sitT = el.id; };
    el.oninput = ()=>{ document.getElementById('sit_prev').innerHTML = sitPreview(); };
  });
  if(document.getElementById('sit_prev')) document.getElementById('sit_prev').innerHTML = sitPreview();
  const spf = document.getElementById('sit_photoFile');
  if(spf){
    spf.onchange = ()=>{
      const f = spf.files[0]; if(!f) return;
      const rd = new FileReader();
      rd.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          const sc = Math.min(1, 1000/img.width);
          const cv = document.createElement('canvas');
          cv.width = Math.round(img.width*sc); cv.height = Math.round(img.height*sc);
          cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
          window._sitPhoto = cv.toDataURL('image/jpeg', 0.72);
          document.getElementById('sit_photoPrev').innerHTML = `<img src="${window._sitPhoto}" style="max-width:100%;border-radius:8px">`;
        };
        img.src = rd.result;
      };
      rd.readAsDataURL(f);
    };
    // 保存済み写真の読み込み
    const s = S.situations.find(x=>x.id===view.sid);
    if(s && s.photo && window._sitPhoto === null){
      idb.get('sit_'+s.id).then(v=>{
        if(v && window._sitPhoto === null){
          window._sitPhoto = v;
          const pv = document.getElementById('sit_photoPrev');
          if(pv) pv.innerHTML = `<img src="${v}" style="max-width:100%;border-radius:8px">`;
        }
      }).catch(()=>{});
    }
  }
  const so = document.getElementById('sch_off');
  if(so) so.onchange = ()=>{ S.showOfficial = so.checked; save(); render(); };
  const skw = document.getElementById('sch_kw');
  if(skw) skw.onchange = ()=>{ view.fkw = skw.value; render(); };
  const mrr = document.getElementById('mr_rule');
  if(mrr) mrr.onchange = ()=>{ view.frule = mrr.value; render(); };
  const mrt = document.getElementById('mr_tag');
  if(mrt) mrt.onchange = ()=>{ view.ftag = mrt.value; render(); };
  const ls = document.getElementById('f_lself');
  if(ls) ls.onchange = ()=>{ if(ls.value==='__new__') quickAddPlayer(ls); };
  const lp = document.getElementById('lg_plot');
  if(lp) lp.onchange = ()=>{ view.plotId = lp.value; render(); };
  document.querySelectorAll('.tset').forEach(el=> el.onchange = ()=>{
    const e = ev();
    e.selfName = document.getElementById('t_self').value.trim();
    e.promote  = Number(document.getElementById('t_promote').value) || null;
    e.promote2 = Number(document.getElementById('t_promote2').value) || null;
    e.stay     = Number(document.getElementById('t_stay').value) || null;
    save(); render();
  });
  document.querySelectorAll('.trival').forEach(el=> el.onchange = ()=>{
    view.rivals = view.rivals || [];
    view.rivals[Number(el.dataset.k)] = el.value;
    render();
  });
  if(document.getElementById('f_self')) refreshSelf();
  const cme = document.getElementById('c_me');
  if(cme) cme.onchange = ()=>{ view.meId = cme.value; render(); };
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.onclick = (evt)=>{ evt.stopPropagation(); act(el.dataset, el); };
  });
}
function act(d, el){
  const A = d.act;
  if(A==='newEvent') go({name:'newEvent'});
  else if(A==='openEvents') go({name:'events'});
  else if(A==='navTo'){ hist.length = 0; go({name:d.v}, false); }
  else if(A==='createEvent') createEvent();
  else if(A==='openEvent'){ const e = S.events.find(x=>x.id===d.id);
    go({name:evView(e), evId:e.id}); }
  else if(A==='openGame') go({name:'game', evId:view.evId, round:Number(d.r)});
  else if(A==='sign'){
    const inp = document.getElementById('g_v'+d.i);
    if(inp.value !== '' && !isNaN(Number(inp.value))) inp.value = String(-Number(inp.value));
    inp.focus();
  }
  else if(A==='saveGame') saveGame();
  else if(A==='importTable'){
    const txt = document.getElementById('t_import').value;
    const parsed = parseLeagueRows(txt);
    if(!parsed.length){ alert('取り込める行が見つかりませんでした。HPの表をそのままコピーするか、「名前 12.3 ▲5.0」の形式で入力してください。'); return; }
    const mode = document.querySelector('#t_imode .on').dataset.m;
    importRows(ev(), parsed, mode);
    save(); render();
  }
  else if(A==='delRow'){ const e=ev(); e.rows = e.rows.filter(r=>r.name!==d.n); save(); render(); }
  else if(A==='help') go({name:'help'});
  else if(A==='versions') go({name:'versions'});
  else if(A==='goView') go({name:d.v});
  else if(A==='openUrl') window.open(d.u, '_blank', 'noopener');
  else if(A==='editSched') go({name:'schedEdit', sid:d.id||null, date0:d.date||null});
  else if(A==='markOff'){
    S.myMark = S.myMark || [];
    const i = S.myMark.indexOf(d.k);
    if(i>=0) S.myMark.splice(i,1); else S.myMark.push(d.k);
    save(); render();
  }
  else if(A==='calDay'){ view.selDay = d.d; render(); }
  else if(A==='calPrev' || A==='calNext'){
    const ym = view.calYM || new Date().toISOString().slice(0,7);
    let [y, m] = ym.split('-').map(Number);
    m += (A==='calNext' ? 1 : -1);
    if(m===0){ m=12; y--; } if(m===13){ m=1; y++; }
    view.calYM = `${y}-${String(m).padStart(2,'0')}`;
    view.selDay = null;
    render();
  }
  else if(A==='saveSched'){
    const title = document.getElementById('sc_title').value.trim();
    if(!title){ alert('タイトルを入力してください'); return; }
    let s = S.schedule.find(x=>x.id===view.sid);
    if(!s){ s = {id:uid()}; S.schedule.push(s); }
    s.date = document.getElementById('sc_date').value;
    s.time = document.getElementById('sc_time').value;
    s.title = title;
    s.venue = document.getElementById('sc_venue').value.trim();
    s.memo = document.getElementById('sc_memo').value.trim();
    save(); back();
  }
  else if(A==='delSched'){ if(confirm('この予定を削除しますか?')){ S.schedule = S.schedule.filter(x=>x.id!==view.sid); save(); back(); } }
  else if(A==='bulkSched'){
    const lines = document.getElementById('sb_text').value.split(/\r?\n/);
    let added = 0; const bad = [];
    lines.forEach(line=>{
      const t = line.trim(); if(!t) return;
      const toks = t.split(/\s+/);
      const date = normDate(toks[0]);
      if(!date || toks.length < 2){ bad.push(line); return; }
      let i = 1, time = '';
      if(/^\d{1,2}:\d{2}$/.test(toks[1])){ time = toks[1]; i = 2; }
      let rest = toks.slice(i).join(' ');
      let venue = '';
      const vm = rest.match(/@(.+)$/);
      if(vm){ venue = vm[1].trim(); rest = rest.replace(/@.+$/,'').trim(); }
      if(!rest){ bad.push(line); return; }
      S.schedule.push({id:uid(), date, time, title:rest, venue, memo:''});
      added++;
    });
    if(!added && !bad.length){ alert('追加する行がありません'); return; }
    save(); render();
    alert(`${added}件を追加しました${bad.length?`\n読めなかった行:\n${bad.join('\n')}`:''}`);
  }
  else if(A==='editVideo') go({name:'videoEdit', vid:d.id||null});
  else if(A==='fetchTitle'){
    const url = document.getElementById('vd_url').value.trim();
    if(!url){ alert('先にURLを入力してください'); return; }
    el.textContent = '取得中…';
    fetch('https://noembed.com/embed?url='+encodeURIComponent(url))
      .then(r=>r.json())
      .then(j=>{ if(j && j.title){
                   document.getElementById('vd_title').value = j.title;
                   if(j.author_name) document.getElementById('vd_channel').value = j.author_name;
                 } else alert('タイトルを自動取得できませんでした。手入力してください。'); })
      .catch(()=>alert('取得に失敗しました(オフライン?)。手入力してください。'))
      .finally(()=>{ el.textContent = 'URLから取得'; });
  }
  else if(A==='saveVideo'){
    const url = document.getElementById('vd_url').value.trim();
    const title = document.getElementById('vd_title').value.trim();
    if(!url && !title){ alert('URLかタイトルを入力してください'); return; }
    let v = S.videos.find(x=>x.id===view.vid);
    if(!v){ v = {id:uid(), added:new Date().toISOString().slice(0,10)}; S.videos.push(v); }
    v.url = url; v.title = title;
    v.channel = document.getElementById('vd_channel').value.trim();
    v.tags = document.getElementById('vd_tags').value.trim();
    v.memo = document.getElementById('vd_memo').value;
    save(); back();
  }
  else if(A==='delVideo'){ if(confirm('この動画メモを削除しますか?')){ S.videos = S.videos.filter(x=>x.id!==view.vid); save(); back(); } }
  else if(A==='editSit'){ window._sitPhoto = null; go({name:'sitEdit', sid:d.id||null}); }
  else if(A==='pickPhoto') document.getElementById('sit_photoFile').click();
  else if(A==='removePhoto'){ window._sitPhoto = false; document.getElementById('sit_photoPrev').innerHTML = ''; }
  else if(A==='saveSit'){
    const hand = document.getElementById('sit_hand').value.trim();
    const hasPhoto = typeof window._sitPhoto === 'string';
    if(!hand && !hasPhoto){ alert('手牌か写真を入力してください'); return; }
    let s = S.situations.find(x=>x.id===view.sid);
    if(!s){ s = {id:uid()}; S.situations.push(s); }
    s.date = document.getElementById('sit_date').value;
    s.kyoku = document.getElementById('sit_kyoku').value.trim();
    s.hand = hand;
    s.dora = document.getElementById('sit_dora').value.trim();
    s.q = document.getElementById('sit_q').value;
    if(hasPhoto){ s.photo = true; idb.put('sit_'+s.id, window._sitPhoto).catch(()=>alert('写真の保存に失敗しました')); }
    else if(window._sitPhoto === false){ s.photo = false; idb.del('sit_'+s.id).catch(()=>{}); }
    save(); back();
  }
  else if(A==='delSit'){ if(confirm('この局面メモを削除しますか?')){ idb.del('sit_'+view.sid).catch(()=>{}); S.situations = S.situations.filter(x=>x.id!==view.sid); save(); back(); } }
  else if(A==='shareSit') shareSitImage();
  else if(A==='secEntry') go({name:'secEntry', evId:view.evId});
  else if(A==='addMyGame') go({name:'myGame', gid:null, tag0:d.tag0});
  else if(A==='openTag') go({name:'myrecTag', tag:d.t});
  else if(A==='importSolo'){
    const tag = document.getElementById('mi_tag').value.trim();
    const presetId = document.getElementById('mi_rule').value;
    const lines = document.getElementById('mi_text').value.split(/\r?\n/);
    let added = 0; const bad = [];
    lines.forEach(line=>{
      let t = line.trim(); if(!t) return;
      t = t.replace(/[▲△]/g,'-').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
           .replace(/．/g,'.').replace(/[－ー−]/g,'-');
      const m = t.split(/\s+/);
      const date = m.length>=3 ? normDate(m[0]) : null;
      const rank = Number(m[1]), pt = Number(m[2]);
      if(!date || isNaN(rank) || rank<1 || rank>4 || isNaN(pt)){ bad.push(line); return; }
      S.myGames.push({id:uid(), date, presetId, tag, solo:true, myRank:rank, myPt:pt, memo:''});
      added++;
    });
    if(!added && !bad.length){ alert('取り込む行がありません'); return; }
    save(); render();
    alert(`${added}件を取り込みました${bad.length?`\n読めなかった行:\n${bad.join('\n')}`:''}`);
  }
  else if(A==='openMyGame') go({name:'myGame', gid:d.id});
  else if(A==='histGo'){
    if(d.k==='my') go({name:'myGame', gid:d.g});
    else go({name:'game', evId:d.e, round:Number(d.r)});
  }
  else if(A==='mgsign'){
    const inp = document.getElementById('mg_v'+d.i);
    if(inp.value !== '' && !isNaN(Number(inp.value))) inp.value = String(-Number(inp.value));
    inp.focus();
  }
  else if(A==='mgptsign'){
    const inp = document.getElementById('mg_mypt');
    if(inp.value !== '' && !isNaN(Number(inp.value))) inp.value = String(-Number(inp.value));
    inp.focus();
  }
  else if(A==='saveMyGame'){
    readMG();
    const g = view.draft; const pr = preset(g.presetId);
    const chk = document.getElementById('mg_check');
    if(g.solo){
      if(g.myPt==='' || isNaN(Number(g.myPt))){ alert('ポイントを入力してください'); return; }
      const rec = {id:g.id||uid(), date:g.date, presetId:g.presetId, tag:g.tag, solo:true,
        myRank:Number(g.myRank)||4, myPt:Number(g.myPt), memo:g.memo};
      const i = S.myGames.findIndex(x=>x.id===rec.id);
      if(i>=0) S.myGames[i] = rec; else S.myGames.push(rec);
      view.draft = null; save(); back();
      return;
    }
    if(g.order.some(v=>!v || v==='__new__')){ alert('4人のプレイヤーを選択してください'); return; }
    if(new Set(g.order).size !== 4){ alert('プレイヤーが重複しています'); return; }
    const vals = g.inputType==='raw' ? g.raw : g.pts;
    if(vals.some(v=>v==='')){ alert('4人分のスコアを入力してください'); return; }
    if(g.inputType==='raw'){
      const kyotaku = Number(g.kyotaku)||0;
      const total = g.raw.map(Number).reduce((a,b)=>a+b,0);
      const need = pr.start*4 - kyotaku;
      if(total !== need){
        chk.innerHTML = `<div class="warn err">⚠️ 検算エラー: 素点合計 ${fmtPt(total)} 点。正しくは ${fmtPt(need)} 点(原点${fmtPt(pr.start)}×4−供託${fmtPt(kyotaku)})のはずです。</div>`;
        return;
      }
    }else{
      const sumT = g.pts.reduce((a,b)=>a+Math.round(Number(b)*10),0);
      if(sumT !== 0){
        chk.innerHTML = `<div class="warn err">⚠️ 検算エラー: 4人のポイント合計が ${fmtP(sumT)} です(0になるはず)。</div>`;
        return;
      }
    }
    const rec = {id:g.id||uid(), date:g.date, presetId:g.presetId, tag:g.tag, order:g.order.slice(),
      inputType:g.inputType, raw:g.inputType==='raw'?g.raw.map(Number):null,
      pts:g.inputType==='pts'?g.pts.map(Number):null, kyotaku:Number(g.kyotaku)||0, memo:g.memo};
    const i = S.myGames.findIndex(x=>x.id===rec.id);
    if(i>=0) S.myGames[i] = rec; else S.myGames.push(rec);
    view.draft = null; save(); back();
  }
  else if(A==='delMyGame'){
    if(confirm('この対局を削除しますか?')){
      S.myGames = S.myGames.filter(x=>x.id!==view.gid);
      view.draft = null; save(); back();
    }
  }
  else if(A==='sesign'){
    const inp = document.getElementById('se_v'+d.i);
    if(inp.value !== '' && !isNaN(Number(inp.value))) inp.value = String(-Number(inp.value));
    inp.focus();
  }
  else if(A==='saveSec'){
    const e = ev();
    const nSec = e.rows.reduce((m,r)=>Math.max(m,r.pts.length),0);
    document.querySelectorAll('.sev').forEach(inp=>{
      const row = e.rows.find(r=>r.name===inp.dataset.name);
      if(!row) return;
      while(row.pts.length < nSec) row.pts.push(0);
      row.pts[nSec] = Number(inp.value)||0;
    });
    save(); back();
  }
  else if(A==='delLastSec'){
    const e = ev();
    const nSec = e.rows.reduce((m,r)=>Math.max(m,r.pts.length),0);
    if(!nSec){ alert('削除できる節がありません'); return; }
    if(confirm(`第${nSec}節のデータを削除しますか?`)){
      e.rows.forEach(r=>{ if(r.pts.length===nSec) r.pts.pop(); });
      save(); render();
    }
  }
  else if(A==='addRivals'){
    const names = (view.rivals||[]).filter(Boolean);
    if(!names.length){ alert('比較相手が選択されていません'); return; }
    let added = [], skipped = [];
    names.forEach(nm=>{
      const key = nm.replace(/\s+/g,'');
      if(S.players.some(p=>p.name.replace(/\s+/g,'')===key)){ skipped.push(nm); return; }
      S.players.push({id:uid(), name:nm, kana:'', org:'最高位戦', memo:''});
      added.push(nm);
    });
    save();
    alert(`${added.length ? added.join('、')+' をプレイヤー帳に追加しました(所属:最高位戦)' : '追加はありません'}${skipped.length ? `\n${skipped.join('、')} は登録済みです` : ''}`);
  }
  else if(A==='clearRows'){ if(confirm('順位表を全て消去しますか?')){ ev().rows = []; save(); render(); } }
  else if(A==='delGame'){
    const e = ev();
    if(confirm(e.mode==='league' ? 'この半荘を削除しますか?' : 'この回戦の入力を削除しますか?(未入力に戻ります)')){
      e.games = e.games.filter(g=>g.round!==view.round);
      if(e.mode==='league') e.games.sort((a,b)=>a.round-b.round).forEach((g,i)=>g.round=i+1);
      save(); back();
    }
  }
  else if(A==='cond') go({name:'cond', evId:view.evId});
  else if(A==='final') go({name:'final', evId:view.evId});
  else if(A==='fhsign'){
    const inp = document.getElementById('fh_v'+d.i);
    if(inp.value !== '' && !isNaN(Number(inp.value))) inp.value = String(-Number(inp.value));
    readFinal(); refreshFinalOut();
  }
  else if(A==='fhtarget'){ ev().finalHand.target = Number(d.t); save(); refreshFinalOut(); }
  else if(A==='copyMode'){
    document.body.classList.add('copy-mode');
    const off = ()=>{ document.body.classList.remove('copy-mode'); document.body.removeEventListener('click', off, true); };
    setTimeout(()=> document.body.addEventListener('click', off, true), 300);
  }
  else if(A==='editEvent') go({name:'eventEdit', evId:view.evId});
  else if(A==='eeAddDate'){
    const inp = document.getElementById('ee_newdate');
    const v = inp.value; if(!v) return;
    const box = document.getElementById('ee_dates');
    if([...box.querySelectorAll('[data-d]')].some(x=>x.dataset.d===v)){ inp.value=''; return; }
    const span = document.createElement('span');
    span.className = 'badge'; span.dataset.d = v;
    span.style.cssText = 'font-size:13px;padding:4px 8px';
    span.innerHTML = `${v.slice(5).replace('-','/')} <b style="cursor:pointer">✕</b>`;
    span.querySelector('b').onclick = ()=>span.remove();
    box.appendChild(span); inp.value='';
  }
  else if(A==='eeDelDate'){ el.closest('[data-d]').remove(); }
  else if(A==='saveEventEdit'){
    const e = ev();
    const name = document.getElementById('ee_name').value.trim();
    if(name) e.name = name;
    e.kind = document.querySelector('#ee_kind .on').dataset.m;
    e.venue = document.getElementById('ee_venue').value.trim();
    if(e.kind==='league'){
      const ds = [...document.querySelectorAll('#ee_dates [data-d]')].map(x=>x.dataset.d);
      const nv = document.getElementById('ee_newdate').value;
      if(nv && !ds.includes(nv)) ds.push(nv);
      ds.sort();
      if(!ds.length){ alert('開催日を1日以上設定してください'); return; }
      e.dates = ds; e.date = ds[0];
    }else{
      e.date = document.getElementById('ee_date').value || e.date;
      e.dates = [e.date];
    }
    const pr = document.getElementById('ee_preset');
    if(pr) e.presetId = pr.value;
    if(e.mode==='tournament'){
      const maxRound = e.games.reduce((mx,g)=>Math.max(mx,g.round),0);
      const rounds = Number(document.getElementById('ee_rounds').value);
      if(rounds < maxRound){ alert(`第${maxRound}回戦まで入力済みのため、回戦数は${maxRound}未満にできません`); return; }
      e.rounds = rounds;
      e.passCount = Number(document.getElementById('ee_pass').value);
      e.tiePolicy = document.querySelector('#ee_tie .on').dataset.m;
      e.selfId = document.getElementById('ee_self').value;
    }
    if(e.mode==='league'){
      const s = document.getElementById('ee_self').value;
      if(!s || s==='__new__'){ alert('「自分」を選択してください'); return; }
      e.selfId = s;
    }
    save(); back();
  }
  else if(A==='delEvent'){ if(confirm('この大会を削除しますか?')){ S.events = S.events.filter(x=>x.id!==view.evId); save(); hist.length=0; go({name:'home'},false);} }
  else if(A==='addPlayer') go({name:'playerEdit', pid:null});
  else if(A==='editPlayer') go({name:'playerEdit', pid:d.id});
  else if(A==='savePlayer'){
    const name = document.getElementById('p_name').value.trim();
    if(!name){ alert('名前を入力してください'); return; }
    let p = player(view.pid);
    if(!p){ p = {id:uid()}; S.players.push(p); }
    p.name = name; p.kana = document.getElementById('p_kana').value.trim();
    p.org = document.getElementById('p_org').value; p.memo = document.getElementById('p_memo').value;
    if(document.getElementById('p_self').checked) S.selfId = p.id;
    else if(S.selfId===p.id) S.selfId = null;
    save(); back();
  }
  else if(A==='delPlayer'){
    const used = S.events.some(e=> (e.playerIds||[]).includes(view.pid) || (e.games||[]).some(g=>g.order.includes(view.pid)))
      || S.myGames.some(g=>(g.order||[]).includes(view.pid));
    if(used){ alert('大会記録があるプレイヤーは削除できません'); return; }
    if(confirm('削除しますか?')){ S.players = S.players.filter(p=>p.id!==view.pid); save(); back(); }
  }
  else if(A==='newPreset') go({name:'presetEdit', pid:null});
  else if(A==='editPreset') go({name:'presetEdit', pid:d.id});
  else if(A==='savePreset'){
    let p = S.customPresets.find(x=>x.id===view.pid);
    if(!p){ p = {id:'c_'+uid()}; S.customPresets.push(p); }
    p.name = document.getElementById('r_name').value.trim()||'カスタム';
    p.start = Number(document.getElementById('r_start').value);
    p.kaeshi = Number(document.getElementById('r_kaeshi').value);
    p.uma = [0,1,2,3].map(i=>Number(document.getElementById('r_uma'+i).value));
    p.oka = Number(document.getElementById('r_oka').value);
    p.tieRank = document.querySelector('#r_tie .on').dataset.m;
    p.kyotakuToTop = document.querySelector('#r_kyo .on').dataset.m==='top';
    save(); back();
  }
  else if(A==='delPreset'){
    if(S.events.some(e=>e.presetId===view.pid)){ alert('このルールを使う大会があるため削除できません'); return; }
    if(confirm('削除しますか?')){ S.customPresets = S.customPresets.filter(x=>x.id!==view.pid); save(); back(); }
  }
  else if(A==='saveTotal'){ ev().myTotal = Number(document.getElementById('b_total').value)||0; save(); render(); }
  else if(A==='addBorder'){
    const v = Number(document.getElementById('b_value').value);
    if(isNaN(v)){ alert('ボーダー値を入力してください'); return; }
    ev().borders.push({label:document.getElementById('b_label').value.trim(), value:v});
    save(); render();
  }
  else if(A==='delBorder'){ ev().borders.splice(Number(d.i),1); save(); render(); }
  else if(A==='export'){
    const blob = new Blob([JSON.stringify(S,null,1)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `joken-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  }
  else if(A==='import'){
    const f = document.getElementById('importFile');
    f.onchange = ()=>{
      const file = f.files[0]; if(!file) return;
      const rd = new FileReader();
      rd.onload = ()=>{
        try{
          const d = JSON.parse(rd.result);
          if(!d.players || !d.events) throw 0;
          if(confirm('現在のデータを読み込んだ内容で置き換えます。よろしいですか?')){ S = d; S.myGames = S.myGames || []; S.videos = S.videos || []; S.situations = S.situations || []; S.schedule = S.schedule || []; S.myMark = S.myMark || []; save(); render(); alert('復元しました'); }
        }catch(e){ alert('ファイルを読み込めませんでした'); }
      };
      rd.readAsText(file);
    };
    f.click();
  }
}
render();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
