<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a5c3a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>条件戦サポート</title>
<style>
  :root{
    --green:#1a5c3a; --green-lt:#e8f3ed; --red:#c0392b; --blue:#1a4a7a;
    --bg:#f5f5f2; --card:#fff; --line:#ddd; --txt:#222; --sub:#777;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
       background:var(--bg); color:var(--txt); font-size:15px;
       padding-bottom:calc(64px + env(safe-area-inset-bottom));}
  header{position:sticky; top:0; z-index:10; background:var(--green); color:#fff;
         padding:calc(10px + env(safe-area-inset-top)) 14px 10px; display:flex; align-items:center; gap:10px;}
  header h1{font-size:17px; margin:0; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  header .back{background:none;border:none;color:#fff;font-size:20px;padding:2px 8px;cursor:pointer;}
  main{padding:12px; max-width:640px; margin:0 auto;}
  .card{background:var(--card); border-radius:10px; padding:14px; margin-bottom:12px;
        box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .card h2{font-size:15px; margin:0 0 10px; color:var(--green);}
  .card h3{font-size:14px; margin:14px 0 6px;}
  label{display:block; font-size:12px; color:var(--sub); margin:10px 0 3px;}
  input[type=text],input[type=number],input[type=date],select{
    width:100%; padding:9px; border:1px solid var(--line); border-radius:8px; font-size:16px; background:#fff;}
  .row{display:flex; gap:8px;} .row>*{flex:1; min-width:0;}
  button.primary{width:100%; padding:12px; background:var(--green); color:#fff; border:none;
    border-radius:8px; font-size:16px; font-weight:bold; margin-top:12px; cursor:pointer;}
  button.secondary{width:100%; padding:10px; background:#fff; color:var(--green); border:1.5px solid var(--green);
    border-radius:8px; font-size:14px; font-weight:bold; margin-top:8px; cursor:pointer;}
  button.danger{background:#fff; color:var(--red); border:1.5px solid var(--red);}
  button.small{width:auto; padding:6px 12px; font-size:13px; margin:0;}
  nav{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
      display:flex; z-index:10; padding-bottom:env(safe-area-inset-bottom);}
  nav button{flex:1; padding:10px 0 8px; background:none; border:none; font-size:11px; color:var(--sub); cursor:pointer;}
  nav button .ico{display:block; font-size:20px;}
  nav button.on{color:var(--green); font-weight:bold;}
  table{border-collapse:collapse; width:100%; font-size:13px;}
  th,td{border:1px solid var(--line); padding:5px 4px; text-align:center;}
  th{background:var(--green-lt); font-weight:600;}
  td.name{text-align:left; white-space:nowrap;}
  .plus{color:var(--blue); font-weight:bold;} .minus{color:var(--red); font-weight:bold;}
  .pass{background:#e8f6ec;} .fail{background:#fbeeec;}
  .badge{display:inline-block; font-size:11px; background:var(--green-lt); color:var(--green);
         border-radius:4px; padding:1px 6px; margin-left:6px;}
  .listitem{display:flex; align-items:center; padding:12px 4px; border-bottom:1px solid #eee; cursor:pointer;}
  .listitem:last-child{border-bottom:none;}
  .listitem .grow{flex:1; min-width:0;}
  .listitem .t{font-weight:bold;} .listitem .s{font-size:12px; color:var(--sub);}
  .warn{background:#fff6e0; border:1px solid #eccb6b; color:#7a5b00; border-radius:8px;
        padding:8px 10px; font-size:13px; margin-top:8px;}
  .err{background:#fbeeec; border:1px solid #e0a9a2; color:var(--red);}
  .ok-note{color:var(--green); font-size:13px; margin-top:6px;}
  .matrix td{font-size:12px; padding:6px 2px;}
  .matrix .uncond{background:#dff3e4; font-weight:bold;}
  .matrix .impossible{background:#f3d9d5; color:#999;}
  .cond-note{font-size:12px; color:var(--sub); margin-top:6px;}
  /* 転記モード */
  body.copy-mode nav, body.copy-mode .no-copy{display:none;}
  body.copy-mode{background:#fff;}
  body.copy-mode .card{box-shadow:none; border:1px solid #000; border-radius:0;}
  body.copy-mode table, body.copy-mode th, body.copy-mode td{border-color:#000; font-size:14px;}
  .seg{display:flex; border:1.5px solid var(--green); border-radius:8px; overflow:hidden; margin-top:4px;}
  .seg button{flex:1; padding:8px; border:none; background:#fff; color:var(--green); font-size:14px; cursor:pointer;}
  .seg button.on{background:var(--green); color:#fff; font-weight:bold;}
  .totline{font-size:20px; font-weight:bold;}
</style>
</head>
<body>
<header><button class="back" id="btnBack" style="display:none">‹</button><h1 id="title">条件戦サポート</h1></header>
<main id="main"></main>
<nav id="nav">
  <button data-v="home"><span class="ico">🀄</span>大会</button>
  <button data-v="players"><span class="ico">👤</span>プレイヤー</button>
  <button data-v="settings"><span class="ico">⚙️</span>設定</button>
</nav>
<script>
"use strict";
/* ================= データ ================= */
const LSKEY = 'jokenapp_v1';
const ORGS = ['最高位戦','連盟','協会','RMU','連合','101','その他','一般'];
const BUILTIN = [
  {id:'saikouisen', name:'最高位戦', start:30000, kaeshi:30000, uma:[30,10,-10,-30], oka:0,  tieRank:'split', kyotakuToTop:false, noten:true,  kiriage:false, builtin:true},
  {id:'classic',    name:'最高位戦Classic', start:30000, kaeshi:30000, uma:[12,4,-4,-12],  oka:0,  tieRank:'split', kyotakuToTop:false, noten:false, kiriage:false, builtin:true},
  {id:'mleague',    name:'Mリーグ', start:25000, kaeshi:30000, uma:[30,10,-10,-30], oka:20, tieRank:'seat',  kyotakuToTop:true,  noten:true,  kiriage:true,  builtin:true},
];
let S = load();
function load(){
  try{ const d = JSON.parse(localStorage.getItem(LSKEY)); if(d) return d; }catch(e){}
  return {players:[], customPresets:[], events:[], selfId:null};
}
function save(){ localStorage.setItem(LSKEY, JSON.stringify(S)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function presets(){ return BUILTIN.concat(S.customPresets); }
function preset(id){ return presets().find(p=>p.id===id) || BUILTIN[0]; }
function player(id){ return S.players.find(p=>p.id===id); }
function pname(id){ const p = player(id); return p ? p.name : '?'; }
function esc(s){ return String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ================= 計算コア =================
   ポイントは内部で「tenths」(0.1P単位の数値)で扱い、丸め誤差を避ける */
const r1 = x => Math.round(x*10)/10;
function fmtP(tenths){ // tenths -> "▲12.3" 形式
  const v = Math.round(tenths)/10;
  const s = (v>0?'+':'') + v.toFixed(1);
  return s;
}
function fmtPt(n){ return n.toLocaleString('ja-JP'); } // 素点

// 半荘計算: raws=素点4つ(席順=起家から), kyotaku=供託残(点)
// 戻り: {pts:[tenths], ranks:[表示用着順(2.5等)], adj:[供託加算後素点]}
function calcGame(pr, raws, kyotaku){
  let adj = raws.slice();
  if(pr.kyotakuToTop && kyotaku > 0){
    let top = 0;
    for(let i=1;i<4;i++) if(adj[i] > adj[top]) top = i; // 同点は席順先
    adj[top] += kyotaku;
  }
  // 順位付け(素点降順、同点は席順昇順で仮順位)
  const idx = [0,1,2,3].sort((a,b)=> adj[b]-adj[a] || a-b);
  // 順位点スロット(tenths): uma + オカは1位スロットに
  const slot = [0,1,2,3].map(r => (pr.uma[r] + (r===0 ? pr.oka : 0)) * 10);
  const share = [0,0,0,0], rankDisp = [0,0,0,0];
  if(pr.tieRank === 'split'){
    let i = 0;
    while(i < 4){
      let j = i;
      while(j+1 < 4 && adj[idx[j+1]] === adj[idx[i]]) j++;
      let sum = 0; for(let k=i;k<=j;k++) sum += slot[k];
      const avg = sum/(j-i+1), rk = (i+1+j+1)/2;
      for(let k=i;k<=j;k++){ share[idx[k]] = avg; rankDisp[idx[k]] = rk; }
      i = j+1;
    }
  }else{ // seat: 起家に近い方が上位
    for(let r=0;r<4;r++){ share[idx[r]] = slot[r]; rankDisp[idx[r]] = r+1; }
  }
  const pts = adj.map((a,i)=> Math.round((a - pr.kaeshi)/100 + share[i]));
  return {pts, ranks:rankDisp, adj};
}
// 大会の累計(tenths) playerIdごと
function totals(ev){
  const t = {};
  ev.playerIds.forEach(id => t[id] = 0);
  ev.games.forEach(g => {
    const res = gamePts(ev, g);
    if(res) g.order.forEach((pid,i)=> t[pid] += res.pts[i]);
  });
  return t;
}
function gamePts(ev, g){
  const pr = preset(ev.presetId);
  if(g.inputType === 'raw'){
    if(!g.raw || g.raw.some(v=>v===null||v===undefined||v==='')) return null;
    return calcGame(pr, g.raw.map(Number), Number(g.kyotaku)||0);
  }else{
    if(!g.pts || g.pts.some(v=>v===null||v===undefined||v==='')) return null;
    const pts = g.pts.map(v=>Math.round(Number(v)*10));
    const idx=[0,1,2,3].sort((a,b)=>pts[b]-pts[a]||a-b);
    const ranks=[0,0,0,0]; idx.forEach((p,r)=>ranks[p]=r+1);
    return {pts, ranks, adj:null};
  }
}
/* 条件計算: 自分(me)と相手(op)のトータルtenths、着順組合せごとの必要素点差
   tieOK: トータル同点でも自分が上になれるか */
function condMatrix(pr, Tme, Top, tieOK){
  const slot = r => (pr.uma[r] + (r===0 ? pr.oka : 0)) * 10;
  const cells = [];
  for(let rm=0; rm<4; rm++){
    const row = [];
    for(let ro=0; ro<4; ro++){
      if(rm === ro){ row.push({type:'diag'}); continue; }
      // 条件: (sMe-sOp)/100 + slot(rm)-slot(ro) + (Tme-Top) > 0 (tieOKなら>=0)
      const base = -(slot(rm) - slot(ro) + (Tme - Top)) * 100; // 必要素点差の境界(点)
      let D = tieOK ? Math.ceil(base/100)*100 : Math.floor(base/100)*100 + 100;
      if(rm < ro){ // 自分が上着順 → 素点差は+100以上が前提
        if(D <= 100) row.push({type:'uncond'});
        else row.push({type:'need', v:D});
      }else{ // 自分が下着順 → 素点差は-100以下が前提
        if(D > -100) row.push({type:'impossible'});
        else row.push({type:'within', v:-D});
      }
    }
    cells.push(row);
  }
  // 同素点(折半)の場合: ウマが相殺されるのでトータル差そのまま
  let tieSame = null;
  if(pr.tieRank === 'split'){
    tieSame = Tme > Top ? true : (Tme < Top ? false : tieOK);
  }
  return {cells, tieSame};
}

/* ===== オーラス判定: 実在する点数の一覧(点数表) ===== */
const KO_RON_L  = [1000,1300,1600,2000,2300,2600,2900,3200,3600,3900,4500,5200,5800,6400,7100,7700,8000,12000,16000,24000,32000,64000];
const OYA_RON_L = [1500,2000,2400,2900,3400,3900,4400,4800,5300,5800,6800,7700,8700,9600,10600,11600,12000,18000,24000,36000,48000,96000];
const KO_TSUMO_L = [[300,500],[400,700],[400,800],[500,1000],[600,1200],[700,1300],[800,1500],[800,1600],
  [1000,2000],[1200,2300],[1300,2600],[1500,2900],[1600,3200],[2000,3900],[2000,4000],[3000,6000],
  [4000,8000],[6000,12000],[8000,16000],[16000,32000]];
const OYA_TSUMO_L = [500,700,800,1000,1200,1300,1500,1600,2000,2300,2600,2900,3200,3900,4000,6000,8000,12000,16000,32000];
function scoreTables(pr){ // 切り上げ満貫ルールでは 7700/11600/2000-3900/3900オール が存在しない
  const kir = !!pr.kiriage;
  return {
    koRon:  KO_RON_L.filter(v=>!(kir && v===7700)),
    oyaRon: OYA_RON_L.filter(v=>!(kir && v===11600)),
    koTsu:  KO_TSUMO_L.filter(p=>!(kir && p[0]===2000 && p[1]===3900)),
    oyaTsu: OYA_TSUMO_L.filter(v=>!(kir && v===3900)),
  };
}
function ronLbl(v, oya){
  const L = oya ? {12000:'満貫',18000:'跳満',24000:'倍満',36000:'三倍満',48000:'役満',96000:'W役満'}
                : {8000:'満貫',12000:'跳満',16000:'倍満',24000:'三倍満',32000:'役満',64000:'W役満'};
  return fmtPt(v) + (L[v] ? `(${L[v]})` : '');
}
function tsuLbl(s, oya){
  if(oya){
    const L = {4000:'満貫',6000:'跳満',8000:'倍満',12000:'三倍満',16000:'役満',32000:'W役満'};
    return fmtPt(s) + 'オール' + (L[s] ? `(${L[s]})` : '');
  }
  const L = {8000:'満貫',12000:'跳満',16000:'倍満',24000:'三倍満',32000:'役満',64000:'W役満'};
  const tot = 2*s[0] + s[1];
  return `${fmtPt(s[0])}-${fmtPt(s[1])}` + (L[tot] ? `(${L[tot]})` : '');
}

/* オーラス判定の本体: 全アウトカムをシミュレーションして通過可否を判定 */
function finalResults(e){
  const pr = preset(e.presetId), f = e.finalHand;
  if(new Set(f.order).size !== 4) return '<div class="card"><div class="warn err">プレイヤーが重複しています</div></div>';
  const meIdx = f.order.indexOf(e.selfId);
  if(meIdx < 0) return `<div class="card"><div class="warn err">「自分」(${esc(pname(e.selfId))})が席にいません</div></div>`;
  if(f.raws.some(v=>v===''||v===null||isNaN(Number(v))))
    return '<div class="card"><div class="warn">4人の現在素点を入力すると条件を表示します</div></div>';
  const raws = f.raws.map(Number), kyo = Number(f.kyotaku)||0, honba = Number(f.honba)||0, dealer = Number(f.dealer);
  const target = Math.min(Number(f.target)||e.passCount, e.passCount);
  // 前回戦までの累計(最終回戦の入力は含めない)
  const preT = {}; e.playerIds.forEach(id=>preT[id]=0);
  e.games.filter(g=>g.round<e.rounds).forEach(g=>{ const r=gamePts(e,g); if(r) g.order.forEach((pid,i)=>preT[pid]+=r.pts[i]); });
  const sum = raws.reduce((a,b)=>a+b,0);
  const warn = (sum+kyo !== pr.start*4)
    ? `<div class="warn">⚠️ 検算: 素点合計${fmtPt(sum)}+供託${fmtPt(kyo)}=${fmtPt(sum+kyo)} ≠ ${fmtPt(pr.start*4)}点。入力を確認してください。</div>` : '';
  // 通過判定: アウトカム適用後の素点で半荘を精算→累計→着順(トータル同点は先着/追いつき設定)
  const passes = (fr, leftKyo) => {
    const res = calcGame(pr, fr, leftKyo);
    const tot = {}; f.order.forEach((pid,i)=> tot[pid] = preT[pid] + res.pts[i]);
    const my = tot[e.selfId]; let above = 0;
    f.order.forEach(pid=>{
      if(pid === e.selfId) return;
      const tieOK = e.tiePolicy==='senchaku' ? preT[e.selfId] > preT[pid] : preT[e.selfId] < preT[pid];
      if(tot[pid] > my || (tot[pid] === my && !tieOK)) above++;
    });
    return above + 1 <= target;
  };
  const T = scoreTables(pr);
  const honRon = 300*honba, honTsu = 100*honba;
  const apply = d => raws.map((x,i)=>x+d[i]);
  const tsumoDelta = (w, s) => {
    const d = [0,0,0,0];
    if(w === dealer){ for(let i=0;i<4;i++) if(i!==w) d[i] = -(s+honTsu); d[w] = 3*s + 3*honTsu + kyo; }
    else { for(let i=0;i<4;i++) if(i!==w) d[i] = -((i===dealer?s[1]:s[0])+honTsu); d[w] = 2*s[0]+s[1] + 3*honTsu + kyo; }
    return d;
  };
  const ronDelta = (w, v, s) => { const d=[0,0,0,0]; d[v] = -(s+honRon); d[w] = s+honRon+kyo; return d; };

  // --- 自分のアガリ条件 ---
  const myTsuL = meIdx===dealer ? T.oyaTsu : T.koTsu;
  let minTsu = null;
  for(const s of myTsuL){ if(passes(apply(tsumoDelta(meIdx, s)), 0)){ minTsu = s; break; } }
  const myRonL = meIdx===dealer ? T.oyaRon : T.koRon;
  const oppIdx = [0,1,2,3].filter(i=>i!==meIdx);
  const myRon = oppIdx.map(v=>{
    let m = null;
    for(const s of myRonL){ if(passes(apply(ronDelta(meIdx, v, s)), 0)){ m = s; break; } }
    return {v, m};
  });
  const noWinPass = passes(raws.slice(), kyo); // このまま流局(罰符なし)なら
  const tgtSeg = `<div class="seg no-copy" style="margin-bottom:10px">${
    Array.from({length:e.passCount},(_,k)=>k+1).map(r=>
      `<button data-act="fhtarget" data-t="${r}" class="${r===target?'on':''}">${r}位通過</button>`).join('')}</div>`;
  const agariCard = `<div class="card"><h2>アガリ条件(${esc(pname(e.selfId))}・${target}位通過)</h2>
    ${warn}${tgtSeg}
    <table>
      <tr><th style="width:40%">ツモ</th><td>${minTsu!==null ? '<b>'+tsuLbl(minTsu, meIdx===dealer)+'</b> 以上' : '<span class="minus">×(役満ツモでも届かず)</span>'}</td></tr>
      ${myRon.map(r=>`<tr><th>${esc(pname(f.order[r.v]))} からロン</th>
        <td>${r.m!==null ? '<b>'+ronLbl(r.m, meIdx===dealer)+'</b> 以上' : '<span class="minus">×(届かず)</span>'}</td></tr>`).join('')}
    </table>
    ${noWinPass ? '<div class="ok-note">※このまま流局(罰符移動なし)でも通過圏です</div>' : ''}
    <div class="cond-note">この局で終局する前提。供託${fmtPt(kyo)}点・${honba}本場を含めて計算。</div>
  </div>`;

  // --- 相手のアガリ許容(◯なら通過維持) ---
  const prefixMax = (list, mk) => { // 打点が上がるほど不利になる前提で、通過を維持できる最大打点
    let last = null, all = true;
    for(const s of list){ if(passes(apply(mk(s)), 0)) last = s; else { all = false; break; } }
    return {last, all};
  };
  const allowRows = oppIdx.map(w=>{
    const isOya = w===dealer;
    const tsu = prefixMax(isOya?T.oyaTsu:T.koTsu, s=>tsumoDelta(w,s));
    const ronMe = prefixMax(isOya?T.oyaRon:T.koRon, s=>ronDelta(w, meIdx, s));
    const others = oppIdx.filter(v=>v!==w);
    let yoko = null;
    for(const v of others){
      const r = prefixMax(isOya?T.oyaRon:T.koRon, s=>ronDelta(w, v, s));
      if(yoko===null || (!r.all && (yoko.all || (yoko.last!==null && (r.last===null || (isOya?T.oyaRon:T.koRon).indexOf(r.last) < (isOya?T.oyaRon:T.koRon).indexOf(yoko.last)))))) yoko = r;
    }
    const cell = (r, tsumo) => r.all ? '<span class="plus">◯無制限</span>'
      : r.last===null ? '<span class="minus">×即アウト</span>'
      : (tsumo ? tsuLbl(r.last, isOya) : ronLbl(r.last, isOya)) + ' まで◯';
    return `<tr><td class="name">${esc(pname(f.order[w]))}${isOya?'<span class="badge">親</span>':''}</td>
      <td>${cell(tsu, true)}</td><td>${cell(ronMe, false)}</td><td>${cell(yoko, false)}</td></tr>`;
  }).join('');
  const allowCard = `<div class="card"><h2>相手のアガリ許容(${target}位通過を維持できる範囲)</h2>
    <table><tr><th>アガる人</th><th>ツモられ</th><th>自分が放銃</th><th>横移動</th></tr>${allowRows}</table>
    <div class="cond-note">「まで◯」=その打点までなら通過維持。横移動は最も不利な放銃者で計算(安全側)。</div>
  </div>`;

  // --- 流局判定 ---
  let drawCard;
  if(pr.noten === false){
    drawCard = `<div class="card"><h2>流局</h2>
      <div>${passes(raws.slice(), kyo) ? '<span class="plus">◯ 通過</span>' : '<span class="minus">× 届かず</span>'}(このルールはノーテン罰符なし)</div></div>`;
  }else{
    const rows = [];
    for(let mask=0; mask<8; mask++){
      const tenOpp = oppIdx.filter((_,k)=> mask & (1<<k));
      const label = tenOpp.length ? tenOpp.map(i=>esc(pname(f.order[i]))).join('・') : 'なし';
      const cells = [true, false].map(myTen=>{
        const ten = new Set(tenOpp); if(myTen) ten.add(meIdx);
        const t = ten.size;
        const fr = raws.map((x,i)=>{
          if(t===0 || t===4) return x;
          return x + (ten.has(i) ? 3000/t : -3000/(4-t));
        });
        return passes(fr, kyo) ? '<span class="plus">◯</span>' : '<span class="minus">×</span>';
      });
      rows.push(`<tr><td class="name">${label}</td><td>${cells[0]}</td><td>${cells[1]}</td></tr>`);
    }
    drawCard = `<div class="card"><h2>流局(ノーテン罰符 場3,000)</h2>
      <table><tr><th>相手のテンパイ</th><th>自分テンパイ</th><th>自分ノーテン</th></tr>${rows.join('')}</table>
    </div>`;
  }
  return agariCard + allowCard + drawCard;
}

/* ================= 大会画面(トーナメント) ================= */
function vEvent(){
  const e = ev(); const pr = preset(e.presetId);
  const T = totals(e);
  const order = e.playerIds.slice().sort((a,b)=> T[b]-T[a]);
  const done = e.games.filter(g=>gamePts(e,g)).length;
  const isFinalNext = done === e.rounds - 1;
  const finished = done >= e.rounds;

  // 順位表(トータル同点は tiePolicy 用に前回戦時点も見るが、表示は単純ソート)
  const rows = order.map((pid,i)=>{
    const rank = i+1;
    const inPass = rank <= e.passCount;
    const diff = rank <= e.passCount
      ? (order[e.passCount] !== undefined ? T[pid]-T[order[e.passCount]] : 0)
      : T[pid]-T[order[e.passCount-1]];
    return `<tr class="${finished ? (inPass?'pass':'fail') : ''}">
      <td>${rank}</td><td class="name">${esc(pname(pid))}${pid===e.selfId?'<span class="badge">自分</span>':''}</td>
      <td class="${T[pid]>=0?'plus':'minus'}">${fmtP(T[pid])}</td>
      <td>${done>0 ? fmtP(diff)+(rank<=e.passCount?'':'差') : '-'}</td></tr>`;
  }).join('');

  const gameRows = [];
  for(let r=1; r<=e.rounds; r++){
    const g = e.games.find(g=>g.round===r);
    const res = g && gamePts(e,g);
    if(res){
      const txt = g.order.map((pid,i)=>`${esc(pname(pid))} ${fmtP(res.pts[i])}`).join(' / ');
      gameRows.push(`<div class="listitem" data-act="openGame" data-r="${r}">
        <div class="grow"><div class="t">${r}回戦 ✅</div><div class="s">${txt}</div></div><div>›</div></div>`);
    }else{
      gameRows.push(`<div class="listitem" data-act="openGame" data-r="${r}">
        <div class="grow"><div class="t">${r}回戦</div><div class="s">未入力</div></div><div>›</div></div>`);
    }
  }
  return `
    <div class="card"><h2>現在の順位 <span class="badge">${pr.name}・${e.passCount}位抜け・${e.tiePolicy==='senchaku'?'先着有利':'追いつき有利'}</span></h2>
      <table><tr><th>順位</th><th>名前</th><th>トータル</th><th>${finished?'差':'ボーダー差'}</th></tr>${rows}</table>
      ${finished ? `<div class="ok-note">全${e.rounds}回戦終了。上位${e.passCount}名が通過です。</div>` : ''}
    </div>
    ${isFinalNext ? `<button class="primary" data-act="cond">📋 条件表を見る(最終${e.rounds}回戦前)</button>
    <button class="secondary" data-act="final">🎯 オーラス判定(最終局のツモ・ロン条件)</button>`
      : (done>0 && !finished ? `<button class="secondary" data-act="cond">条件表(途中経過: ${done}回戦終了時点)</button>` : '')}
    <div class="card"><h2>スコア入力</h2>${gameRows.join('')}</div>
    <button class="secondary danger no-copy" data-act="delEvent">この大会を削除</button>`;
}

function saveGame(){
  const e = ev(); const pr = preset(e.presetId);
  const t = document.querySelector('#g_type .on').dataset.m;
  const order = [0,1,2,3].map(i=>document.getElementById('g_p'+i).value);
  if(order.some(v=>!v || v==='__new__')){ alert('4人のプレイヤーを選択してください'); return; }
  if(new Set(order).size !== 4){ alert('プレイヤーが重複しています'); return; }
  const extra = e.mode==='league' ? {date: document.getElementById('g_date').value || new Date().toISOString().slice(0,10)} : {};
  const vals = [0,1,2,3].map(i=>document.getElementById('g_v'+i).value);
  if(vals.some(v=>v==='')){ alert('4人分のスコアを入力してください'); return; }
  const chk = document.getElementById('g_check');
  if(t === 'raw'){
    const raws = vals.map(Number);
    const kyotaku = Number(document.getElementById('g_kyotaku').value)||0;
    const expect = pr.start*4 - (pr.kyotakuToTop ? 0 : kyotaku);
    const sum = raws.reduce((a,b)=>a+b,0) + (pr.kyotakuToTop ? kyotaku : 0);
    // トップ取りの場合: 入力素点+供託 = 原点×4 / 別扱いの場合: 入力素点合計 = 原点×4-供託
    const total = raws.reduce((a,b)=>a+b,0);
    const need = pr.start*4 - kyotaku;
    if(total !== need){
      chk.innerHTML = `<div class="warn err">⚠️ 検算エラー: 素点合計 ${fmtPt(total)} 点。正しくは ${fmtPt(need)} 点(原点${fmtPt(pr.start)}×4−供託${fmtPt(kyotaku)})のはずです。入力を確認してください。</div>`;
      return;
    }
    upsertGame(e, {round:view.round, order, inputType:'raw', raw:raws, pts:null, kyotaku, ...extra});
  }else{
    const pts = vals.map(Number);
    const sumT = Math.round(pts.reduce((a,b)=>a+Math.round(b*10),0));
    if(sumT !== 0){
      chk.innerHTML = `<div class="warn err">⚠️ 検算エラー: 4人のポイント合計が ${fmtP(sumT)} です(0になるはず)。オカ・供託の扱いを含め確認してください。</div>`;
      return;
    }
    upsertGame(e, {round:view.round, order, inputType:'pts', raw:null, pts, kyotaku:0, ...extra});
  }
  save(); back();
}
function upsertGame(e, g){
  const i = e.games.findIndex(x=>x.round===g.round);
  if(i>=0) e.games[i] = g; else e.games.push(g);
}

/* ================= 条件表 ================= */
function vCond(){
  const e = ev(); const pr = preset(e.presetId);
  const T = totals(e);
  const done = e.games.filter(g=>gamePts(e,g)).length;
  const me = view.meId || e.selfId;
  const order = e.playerIds.slice().sort((a,b)=> T[b]-T[a]);
  const myRank = order.indexOf(me)+1;
  const opps = order.filter(pid=>pid!==me);
  const needBeat = 4 - e.passCount;

  const meOpts = e.playerIds.map(pid=>`<option value="${pid}" ${pid===me?'selected':''}>${esc(pname(pid))}</option>`).join('');

  const head = `<div class="card">
    <h2>現況(${done}回戦終了時点) <span class="badge">${pr.name}・${e.passCount}位抜け・${e.tiePolicy==='senchaku'?'先着有利':'追いつき有利'}</span></h2>
    <table><tr><th>順位</th><th>名前</th><th>トータル</th><th>自分との差</th></tr>
    ${order.map((pid,i)=>`<tr ${pid===me?'style="font-weight:bold;background:var(--green-lt)"':''}>
      <td>${i+1}</td><td class="name">${esc(pname(pid))}</td>
      <td class="${T[pid]>=0?'plus':'minus'}">${fmtP(T[pid])}</td>
      <td>${pid===me?'—':fmtP(T[pid]-T[me])}</td></tr>`).join('')}
    </table>
    <div class="cond-note">通過条件: 3人中 <b>${needBeat}人</b> にトータルで勝てば ${e.passCount}位以内 = 通過</div>
    <div class="no-copy"><label>条件の対象者</label><select id="c_me">${meOpts}</select></div>
  </div>`;

  const mats = opps.map(op=>{
    const tieOK = e.tiePolicy==='senchaku' ? T[me] > T[op] : T[me] < T[op];
    const {cells, tieSame} = condMatrix(pr, T[me], T[op], tieOK);
    const rows = cells.map((row,rm)=>{
      const tds = row.map(c=>{
        if(c.type==='diag') return '<td>—</td>';
        if(c.type==='uncond') return '<td class="uncond">無条件◯</td>';
        if(c.type==='impossible') return '<td class="impossible">×</td>';
        if(c.type==='need') return `<td>${fmtPt(c.v)}<br>以上</td>`;
        return `<td>${fmtPt(c.v)}<br>差以内</td>`;
      }).join('');
      return `<tr><th>自分${rm+1}着</th>${tds}</tr>`;
    }).join('');
    return `<div class="card">
      <h2>vs ${esc(pname(op))} <span class="badge">現在差 ${fmtP(T[me]-T[op])}</span></h2>
      <table class="matrix">
        <tr><th></th><th>相手1着</th><th>相手2着</th><th>相手3着</th><th>相手4着</th></tr>
        ${rows}
      </table>
      <div class="cond-note">数値=最終戦での必要素点差(自分−相手)。「無条件◯」=その着順同士なら素点差不問で勝ち。「×」=その着順同士では届かない。
      ${tieSame!==null ? `同素点(着順折半)の場合: <b>${tieSame?'◯ 勝ち':'× 負け'}</b>(ウマ相殺でトータル差${fmtP(T[me]-T[op])}のまま)。`:''}
      トータル同点時は${tieOK?'<b>自分が上</b>':'<b>相手が上</b>'}(${e.tiePolicy==='senchaku'?'先着有利':'追いつき有利'})。</div>
    </div>`;
  }).join('');

  return head + mats + `
    <button class="primary no-copy" data-act="copyMode">📝 転記モード(紙に書き写す)</button>
    <div class="cond-note no-copy" style="margin-top:8px">転記モードでは画面を白黒シンプル表示にします。画面を戻るには転記モード中に画面をタップしてください。</div>`;
}

/* ================= ボーダー比較モード ================= */
function vBorder(){
  const e = ev(); const pr = preset(e.presetId);
  const slot = r => (pr.uma[r] + (r===0 ? pr.oka : 0)) * 10;
  const borderRows = (e.borders||[]).map((b,bi)=>{
    const cells = [0,1,2,3].map(r=>{
      // 必要: myTotal + (s-kaeshi)/100 + slot(r) >= border*10 (同点は要確認なので「以上」表記)
      const needT = Math.round(b.value*10) - Math.round(e.myTotal*10) - slot(r);
      const needRaw = Math.ceil(needT*100/100)*100 * 1 ; // needT(0.1P)→点
      const raw = pr.kaeshi + needT*100;
      const rawCeil = Math.ceil(raw/100)*100;
      if(rawCeil <= 0) return `<td class="uncond">無条件◯</td>`;
      return `<td>${fmtPt(rawCeil)}<br>以上</td>`;
    }).join('');
    return `<tr><td class="name">${esc(b.label||('想定'+(bi+1)))}<br><b>${b.value.toFixed(1)}</b></td>${cells}
      <td class="no-copy"><button class="small danger" data-act="delBorder" data-i="${bi}">✕</button></td></tr>`;
  }).join('');
  return `<div class="card">
      <h2>自分の現在トータル <span class="badge">${pr.name}</span></h2>
      <div class="row"><input type="number" id="b_total" step="0.1" value="${e.myTotal}">
      <button class="small primary" style="margin:0;flex:0.4" data-act="saveTotal">更新</button></div>
      <div class="totline" style="margin-top:8px" >現在: <span class="${e.myTotal>=0?'plus':'minus'}">${(e.myTotal>=0?'+':'')+Number(e.myTotal).toFixed(1)}</span></div>
    </div>
    <div class="card">
      <h2>通過ライン想定と必要素点</h2>
      <table><tr><th>ボーダー</th><th>1着なら</th><th>2着なら</th><th>3着なら</th><th>4着なら</th><th class="no-copy"></th></tr>
      ${borderRows || '<tr><td colspan="6" style="color:var(--sub)">ボーダー想定値を追加してください</td></tr>'}</table>
      <div class="cond-note">最終戦で必要な素点(終局時持ち点)。ボーダーちょうどの扱い(同点通過か)は大会規定に合わせて判断してください(表は「ボーダー以上」で計算)。</div>
      <div class="row no-copy" style="margin-top:10px">
        <input type="text" id="b_label" placeholder="ラベル(例:楽観)">
        <input type="number" id="b_value" step="0.1" placeholder="ボーダーP">
        <button class="small primary" style="margin:0;flex:0.5" data-act="addBorder">追加</button>
      </div>
    </div>
    <button class="primary no-copy" data-act="copyMode">📝 転記モード</button>
    <button class="secondary danger no-copy" data-act="delEvent">この大会を削除</button>`;
}

/* ================= リーグ戦(記録)モード ================= */
const CHART_COLORS = ['#2e7d32','#1565c0','#c62828','#ef6c00','#6a1b9a','#00838f','#5d4037','#455a64'];
function vLeague(){
  const e = ev(); const pr = preset(e.presetId);
  const games = e.games.slice().sort((a,b)=>a.round-b.round).filter(g=>gamePts(e,g));
  // --- 自分の通算成績 ---
  let cum=0, n=0, rankSum=0; const dist={1:0,2:0,3:0,4:0};
  games.forEach(g=>{
    const r = gamePts(e,g); const i = g.order.indexOf(e.selfId); if(i<0) return;
    n++; cum += r.pts[i]; const rk = r.ranks[i]; rankSum += rk;
    if(Number.isInteger(rk)) dist[rk]++; else { dist[Math.floor(rk)]+=0.5; dist[Math.ceil(rk)]+=0.5; }
  });
  const fmtD = v => Number.isInteger(v) ? v : v.toFixed(1);
  const statCard = `<div class="card"><h2>${esc(pname(e.selfId))} の通算 <span class="badge">${esc(pr.name)}</span></h2>
    <div class="totline">累計: <span class="${cum>=0?'plus':'minus'}" style="font-size:26px;font-weight:bold">${fmtP(cum)}</span></div>
    ${n ? `<table style="margin-top:8px"><tr><th>対局</th><th>平均着順</th><th>トップ</th><th>2着</th><th>3着</th><th>ラス</th></tr>
      <tr><td>${n}</td><td>${(rankSum/n).toFixed(2)}</td>
      <td>${fmtD(dist[1])}回<br>${(dist[1]/n*100).toFixed(0)}%</td><td>${fmtD(dist[2])}回<br>${(dist[2]/n*100).toFixed(0)}%</td>
      <td>${fmtD(dist[3])}回<br>${(dist[3]/n*100).toFixed(0)}%</td><td>${fmtD(dist[4])}回<br>${(dist[4]/n*100).toFixed(0)}%</td></tr></table>
      <div class="cond-note">同点折半の着順(2.5着など)は0.5回ずつで集計</div>` : ''}
  </div>`;
  // --- 推移グラフ ---
  const parts = [...new Set(games.flatMap(g=>g.order))];
  const plotId = (view.plotId && (view.plotId==='all' || parts.includes(view.plotId))) ? view.plotId : e.selfId;
  const series = (plotId==='all' ? parts : [plotId]).map(pid=>{
    let c = 0;
    return {name:pname(pid), self:pid===e.selfId, color:CHART_COLORS[parts.indexOf(pid)%CHART_COLORS.length],
      values:[0, ...games.map(g=>{ const r=gamePts(e,g); const i=g.order.indexOf(pid); if(i>=0) c+=r.pts[i]; return c; })]};
  });
  const plotOpts = `<option value="${e.selfId}" ${plotId===e.selfId?'selected':''}>${esc(pname(e.selfId))}(自分)</option>
    <option value="all" ${plotId==='all'?'selected':''}>全員</option>
    ${parts.filter(p=>p!==e.selfId).map(p=>`<option value="${p}" ${plotId===p?'selected':''}>${esc(pname(p))}</option>`).join('')}`;
  const chartCard = `<div class="card"><h2>ポイント推移</h2>
    ${games.length ? lineChart(series) : '<div class="cond-note">半荘を入力するとグラフが表示されます</div>'}
    <div class="no-copy"><label>表示対象</label><select id="lg_plot">${plotOpts}</select></div>
  </div>`;
  // --- 対局記録(日付=節ごと) ---
  const sorted = e.games.slice().sort((a,b)=>a.round-b.round);
  const dates = [...new Set(sorted.map(g=>g.date||''))];
  const items = [];
  dates.forEach((dt,di)=>{
    const label = dt ? `第${di+1}節 ${dt.slice(5).replace('-','/')}` : '日付未設定';
    items.push(`<div class="s" style="margin-top:10px;color:var(--sub);font-weight:bold">${label}</div>`);
    sorted.filter(g=>(g.date||'')===dt).forEach(g=>{
      const r = gamePts(e,g);
      const i = r ? g.order.indexOf(e.selfId) : -1;
      const mine = r ? (i>=0 ? `${r.ranks[i]}着 ${fmtP(r.pts[i])}` : '(自分不参加)') : '未入力';
      const cls = (r && i>=0) ? (r.pts[i]>=0?'plus':'minus') : '';
      const sub = r ? g.order.map((pid,j)=>`${esc(pname(pid))} ${fmtP(r.pts[j])}`).join(' / ') : '';
      items.push(`<div class="listitem" data-act="openGame" data-r="${g.round}">
        <div class="grow"><div class="t">第${g.round}半荘 <span class="${cls}">${mine}</span></div>
        <div class="s">${sub}</div></div><div>›</div></div>`);
    });
  });
  const nextRound = e.games.reduce((m,g)=>Math.max(m,g.round),0) + 1;
  return statCard + chartCard + `
    <div class="card"><h2>対局記録</h2>${items.join('') || '<div style="color:var(--sub);padding:8px">まだ対局がありません</div>'}</div>
    <button class="primary" data-act="openGame" data-r="${nextRound}">＋ 半荘を追加</button>
    <button class="secondary danger no-copy" data-act="delEvent">この大会を削除</button>`;
}
function lineChart(series, xLabel='半荘数'){
  const W=680, H=320, L=52, R=14, T=14, B=30;
  const n = Math.max(...series.map(s=>s.values.length));
  let mn=0, mx=0;
  series.forEach(s=>s.values.forEach(v=>{ if(v<mn)mn=v; if(v>mx)mx=v; }));
  if(mx===mn){ mx+=100; mn-=100; }
  const pad=(mx-mn)*0.08; mx+=pad; mn-=pad;
  const X=i=> L+(W-L-R)*(n<=1?0:i/(n-1));
  const Y=v=> T+(H-T-B)*(1-(v-mn)/(mx-mn));
  // 目盛り(内部値は0.1P単位 → P表示)
  const rawStep=(mx-mn)/4.5, mag=Math.pow(10,Math.floor(Math.log10(rawStep)));
  const step=[1,2,2.5,5,10].map(m=>m*mag).find(s=>s>=rawStep)||mag*10;
  let grid='';
  for(let v=Math.ceil(mn/step)*step; v<=mx; v+=step){
    const y=Y(v), zero=Math.abs(v)<1e-9;
    grid+=`<line x1="${L}" y1="${y.toFixed(1)}" x2="${W-R}" y2="${y.toFixed(1)}" stroke="${zero?'#999':'#e3e3e3'}" stroke-width="${zero?1.5:1}"/>
      <text x="${L-6}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="11" fill="#666">${(v/10).toFixed(0)}</text>`;
  }
  const xt=Math.max(1, Math.ceil((n-1)/10));
  let xax='';
  for(let i=xt; i<n; i+=xt) xax+=`<text x="${X(i).toFixed(1)}" y="${H-B+16}" text-anchor="middle" font-size="11" fill="#666">${i}</text>`;
  const lines=series.map(s=>{
    const pts=s.values.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
    const dots=(n<=40) ? s.values.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3" fill="${s.color}"/>`).join('') : '';
    return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="${s.self?3:1.8}"${s.dash?' stroke-dasharray="7 5"':''}/>${dots}`;
  }).join('');
  const legend=series.length>1 ? `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">${series.map(s=>
    `<span style="font-size:12px"><span style="display:inline-block;width:14px;height:3px;background:${s.color};vertical-align:middle;margin-right:3px"></span>${esc(s.name)}</span>`).join('')}</div>` : '';
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${grid}${xax}${lines}</svg>${legend}
    <div class="cond-note">縦軸: ポイント / 横軸: ${xLabel}</div>`;
}

/* ================= リーグ順位表モード ================= */
function parseLeagueRows(text){
  const rows = [];
  text.split(/\r?\n/).forEach(line=>{
    let t = line.trim(); if(!t) return;
    t = t.replace(/[▲△]/g,'-').replace(/[，,]/g,'')
         .replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
         .replace(/．/g,'.').replace(/[－ー−]/g,'-');
    const toks = t.split(/[\s\t]+/).filter(Boolean);
    if(!toks.length) return;
    let i = 0;
    // 先頭が順位番号(直後が名前)ならスキップ
    if(/^\d+\.?$/.test(toks[0]) && toks.length>2 && !/^-?\d/.test(toks[1])) i = 1;
    const nameToks = [];
    while(i<toks.length && !/^-?\d+(\.\d+)?$/.test(toks[i])){ nameToks.push(toks[i]); i++; }
    if(!nameToks.length) return;
    const nums = [];
    for(; i<toks.length; i++){ if(/^-?\d+(\.\d+)?$/.test(toks[i])) nums.push(parseFloat(toks[i])); }
    if(!nums.length) return;
    const close = (a,b)=>Math.abs(a-b)<0.051;
    let pts;
    if(nums.length>=3 && close(nums[0], nums.slice(2).reduce((a,b)=>a+b,0))) pts = nums.slice(2);      // Total+対局数+節…(HP形式)
    else if(nums.length>=2 && close(nums[0], nums.slice(1).reduce((a,b)=>a+b,0))) pts = nums.slice(1); // Total+節…
    else pts = nums;                                                                                    // 節のみ(手入力)
    rows.push({name:nameToks.join(' '), pts});
  });
  return rows;
}
function importRows(e, parsed, mode){
  parsed.forEach(r=>{
    const key = r.name.replace(/\s+/g,'');
    let row = e.rows.find(x=>x.name.replace(/\s+/g,'')===key);
    if(!row){ row = {name:r.name, pts:[]}; e.rows.push(row); }
    if(mode==='append') row.pts = row.pts.concat(r.pts);
    else row.pts = r.pts;
  });
}
function vTable(){
  const e = ev();
  e.rows = e.rows || [];
  const nSec = e.rows.reduce((m,r)=>Math.max(m,r.pts.length),0);
  const total = r => r.pts.reduce((a,b)=>a+(b||0),0);
  const rows = e.rows.slice().sort((a,b)=>total(b)-total(a));
  const selfKey = (e.selfName||'').replace(/\s+/g,'');
  const isSelf = r => selfKey && r.name.replace(/\s+/g,'')===selfKey;
  const selfRow = rows.find(isSelf);
  const promote  = Number(e.promote)||0;
  const promote2 = Number(e.promote2)||0;
  const stay     = Number(e.stay)||0;
  const p2Total = (promote2>0 && rows.length>=promote2) ? total(rows[promote2-1]) : null;
  const pTotal  = (promote>0  && rows.length>=promote)  ? total(rows[promote-1])  : null;
  // 残留ライン = 残留できる最下位(上からstay位)のTotal
  const dTotal  = (stay>0 && rows.length>=stay) ? total(rows[stay-1]) : null;
  const borderTotal = pTotal;
  // --- 設定+取り込み ---
  const setCard = `<div class="card"><h2>設定</h2>
    <label>自分の名前</label><input type="text" id="t_self" class="tset" value="${esc(e.selfName||'')}">
    <div class="row">
      <div><label>2段階昇級(位)</label><input type="number" id="t_promote2" class="tset" inputmode="numeric" value="${e.promote2||''}"></div>
      <div><label>昇級(位)</label><input type="number" id="t_promote" class="tset" inputmode="numeric" value="${e.promote||''}"></div>
      <div><label>残留ライン(位)</label><input type="number" id="t_stay" class="tset" inputmode="numeric" value="${e.stay||''}"></div>
    </div>
  </div>
  <div class="card no-copy"><h2>結果の取り込み</h2>
    <div class="seg" id="t_imode">
      <button data-m="replace" class="on">全節を上書き(HP貼り付け)</button>
      <button data-m="append">節を追加</button>
    </div>
    <textarea id="t_import" rows="4" style="width:100%;box-sizing:border-box;font-size:14px;margin-top:6px"
      placeholder="公式HPの成績表をコピーして貼り付け(順位・名前・Total・節ポイントの行)。&#10;手入力は「名前 12.3 ▲5.0」の形式でもOK(▲=マイナス)"></textarea>
    <button class="primary" data-act="importTable">取り込む</button>
  </div>`;
  // --- 順位表 ---
  const trs = rows.map((r,ri)=>{
    const diff = borderTotal!==null ? total(r)-borderTotal : (selfRow && !isSelf(r) ? total(r)-total(selfRow) : null);
    const zone = (promote2>0 && ri<promote2) ? 'background:#e5d5f5'
               : (promote>0 && ri<promote) ? 'background:var(--green-lt)'
               : (stay>0 && ri>=stay) ? 'background:#fadadd' : '';
    return `<tr ${isSelf(r)?'style="font-weight:bold;background:var(--green-lt)"':''}>
      <td style="${zone}">${ri+1}</td><td class="name" style="white-space:nowrap">${esc(r.name)}</td>
      <td class="${total(r)>=0?'plus':'minus'}" style="white-space:nowrap">${total(r).toFixed(1)}</td>
      <td style="white-space:nowrap">${diff===null?'—':(diff>=0?'+':'')+diff.toFixed(1)}</td>
      ${Array.from({length:nSec},(_,k)=>`<td>${r.pts[k]===undefined?'':r.pts[k].toFixed(1)}</td>`).join('')}
      <td class="no-copy"><button class="small danger" data-act="delRow" data-n="${esc(r.name)}">✕</button></td></tr>`;
  }).join('');
  const fmtd = v => `<span class="${v>=0?'plus':'minus'}">${(v>=0?'+':'')+v.toFixed(1)}</span>`;
  const selfLines = selfRow ? [
    p2Total!==null ? `2段階昇級ライン(${promote2}位) ${p2Total.toFixed(1)} → 差 ${fmtd(total(selfRow)-p2Total)}` : '',
    pTotal!==null  ? `昇級ライン(${promote}位) ${pTotal.toFixed(1)} → 差 ${fmtd(total(selfRow)-pTotal)}` : '',
    dTotal!==null  ? `残留ライン(${stay}位) ${dTotal.toFixed(1)} → 差 ${fmtd(total(selfRow)-dTotal)}` : '',
  ].filter(Boolean).map(s=>`<div class="s">${s}</div>`).join('') : '';
  const tableCard = `<div class="card"><h2>順位表(${rows.length}名)</h2>
    ${selfRow ? `<div class="totline">自分: <b>${rows.indexOf(selfRow)+1}位 ${total(selfRow).toFixed(1)}</b></div>${selfLines}` : ''}
    ${(promote2>0||promote>0||demote>0) ? `<div class="cond-note">順位の色: <span style="background:#e5d5f5">■</span>2段階昇級圏 <span style="background:var(--green-lt)">■</span>昇級圏 <span style="background:#fadadd">■</span>降級圏</div>` : ''}
    <div style="overflow-x:auto">
    <table><tr><th>順位</th><th>名前</th><th>Total</th><th>${borderTotal!==null?'ライン差':'自分との差'}</th>
      ${Array.from({length:nSec},(_,k)=>`<th>${k+1}節</th>`).join('')}<th class="no-copy"></th></tr>
    ${trs || `<tr><td colspan="${5+nSec}" style="color:var(--sub)">上の欄から結果を取り込んでください</td></tr>`}</table></div>
  </div>`;
  // --- 推移グラフ ---
  const cumOf = r => { let c=0; return [0, ...Array.from({length:nSec},(_,k)=>{ c+=(r.pts[k]||0); return Math.round(c*10); })]; };
  const series = [];
  if(selfRow) series.push({name:(e.selfName||'自分'), self:true, color:'#2e7d32', values:cumOf(selfRow)});
  const lineAt = (idx, name, color) => { // idx: 0始まりの順位
    if(idx<0 || idx>=rows.length || nSec===0) return;
    const bvals = [0];
    for(let k=1;k<=nSec;k++){
      const tots = rows.map(r=>r.pts.slice(0,k).reduce((a,b)=>a+(b||0),0)).sort((a,b)=>b-a);
      bvals.push(Math.round(tots[idx]*10));
    }
    series.push({name, color, dash:true, values:bvals});
  };
  if(promote2>0) lineAt(promote2-1, `2段階昇級(${promote2}位)`, '#6a1b9a');
  if(promote>0)  lineAt(promote-1,  `昇級(${promote}位)`, '#c62828');
  if(stay>0)     lineAt(stay-1, `残留ライン(${stay}位)`, '#455a64');
  const rival = rows.find(r=>r.name===view.rival);
  if(rival && !isSelf(rival)) series.push({name:rival.name, color:'#1565c0', values:cumOf(rival)});
  const rivalOpts = `<option value="">なし</option>` +
    rows.filter(r=>!isSelf(r)).map(r=>`<option value="${esc(r.name)}" ${r.name===view.rival?'selected':''}>${esc(r.name)}</option>`).join('');
  const chartCard = `<div class="card"><h2>推移グラフ</h2>
    ${series.length && nSec>0 ? lineChart(series,'節') : '<div class="cond-note">結果を取り込むとグラフが表示されます(自分の名前を設定してください)</div>'}
    <div class="no-copy"><label>比較相手を追加</label><select id="t_rival">${rivalOpts}</select></div>
  </div>`;
  return setCard + tableCard + chartCard + `
    <button class="secondary danger no-copy" data-act="clearRows">順位表を全て消去</button>
    <button class="secondary danger no-copy" data-act="delEvent">この大会を削除</button>`;
}

/* ================= プレイヤー帳 ================= */
function vPlayers(){
  const stats = playerStats();
  const items = S.players.slice().sort((a,b)=>(a.kana||a.name).localeCompare(b.kana||b.name,'ja')).map(p=>{
    const st = stats[p.id];
    const s = st ? `${st.games}対局・平均着順${st.avgRank.toFixed(2)}・通算${fmtP(st.total)}` : '対局記録なし';
    return `<div class="listitem" data-act="editPlayer" data-id="${p.id}">
      <div class="grow"><div class="t">${esc(p.name)}<span class="badge">${esc(p.org||'')}</span>${p.id===S.selfId?'<span class="badge">自分</span>':''}</div>
      <div class="s">${s}</div></div><div>›</div></div>`;
  }).join('') || '<div style="color:var(--sub);padding:8px">まだ登録がありません</div>';
  return `<div class="card"><h2>プレイヤー帳(${S.players.length}名)</h2>${items}</div>
    <button class="primary" data-act="addPlayer">＋ プレイヤー登録</button>`;
}
function playerStats(){
  const st = {};
  S.events.filter(e=>e.mode==='tournament'||e.mode==='league').forEach(e=>{
    e.games.forEach(g=>{
      const res = gamePts(e,g); if(!res) return;
      g.order.forEach((pid,i)=>{
        st[pid] = st[pid] || {games:0, rankSum:0, total:0};
        st[pid].games++; st[pid].rankSum += res.ranks[i]; st[pid].total += res.pts[i];
      });
    });
  });
  Object.values(st).forEach(s=> s.avgRank = s.rankSum/s.games);
  return st;
}
function vPlayerEdit(){
  const p = player(view.pid) || {id:null, name:'', kana:'', org:'最高位戦', memo:''};
  const orgOpts = ORGS.map(o=>`<option ${o===p.org?'selected':''}>${o}</option>`).join('');
  // 対戦履歴
  let histHtml = '';
  if(p.id){
    const rows = [];
    S.events.filter(e=>e.mode==='tournament'||e.mode==='league').slice().reverse().forEach(e=>{
      e.games.forEach(g=>{
        const i = g.order.indexOf(p.id); if(i<0) return;
        const res = gamePts(e,g); if(!res) return;
        const lbl = e.mode==='league' ? `${g.date ? g.date.slice(5).replace('-','/')+' ' : ''}第${g.round}半荘` : `${g.round}回戦`;
        rows.push(`<tr><td class="name">${esc(e.name)} ${lbl}</td><td>${res.ranks[i]}着</td>
          <td class="${res.pts[i]>=0?'plus':'minus'}">${fmtP(res.pts[i])}</td></tr>`);
      });
    });
    if(rows.length) histHtml = `<div class="card"><h2>対戦履歴</h2><table>
      <tr><th>対局</th><th>着順</th><th>P</th></tr>${rows.join('')}</table></div>`;
  }
  return `<div class="card">
    <label>名前</label><input type="text" id="p_name" value="${esc(p.name)}">
    <label>読み仮名(並び順用)</label><input type="text" id="p_kana" value="${esc(p.kana)}">
    <label>所属</label><select id="p_org">${orgOpts}</select>
    <label>メモ</label><input type="text" id="p_memo" value="${esc(p.memo)}" placeholder="打ち筋メモなど">
    <label><input type="checkbox" id="p_self" ${p.id===S.selfId?'checked':''} style="width:auto"> このプレイヤーは自分</label>
    <button class="primary" data-act="savePlayer">保存</button>
    ${p.id?'<button class="secondary danger" data-act="delPlayer">削除</button>':''}
  </div>${histHtml}`;
}

/* ================= 設定 ================= */
function vSettings(){
  const customs = S.customPresets.map(p=>`<div class="listitem" data-act="editPreset" data-id="${p.id}">
    <div class="grow"><div class="t">${esc(p.name)}</div>
    <div class="s">原点${fmtPt(p.start)}/返し${fmtPt(p.kaeshi)}・ウマ${p.uma.join('/')}・オカ${p.oka}</div></div><div>›</div></div>`).join('');
  return `<div class="card"><h2>ルールプリセット</h2>
      ${BUILTIN.map(p=>`<div class="listitem"><div class="grow"><div class="t">${p.name}</div>
        <div class="s">原点${fmtPt(p.start)}/返し${fmtPt(p.kaeshi)}・ウマ${p.uma.join('/')}・オカ${p.oka}・同点${p.tieRank==='split'?'折半':'起家順'}・供託${p.kyotakuToTop?'トップ取り':'別扱い'}</div></div></div>`).join('')}
      ${customs}
      <button class="secondary" data-act="newPreset">＋ カスタムルール追加</button>
    </div>
    <div class="card"><h2>データ管理</h2>
      <button class="secondary" data-act="export">📤 バックアップ(JSON書き出し)</button>
      <button class="secondary" data-act="import">📥 復元(JSON読み込み)</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <div class="cond-note">データはこの端末のブラウザ内にのみ保存されます。機種変更前に必ず書き出してください。</div>
    </div>
    <div class="cond-note">条件戦サポート v1.0</div>`;
}
function vPresetEdit(){
  const p = S.customPresets.find(x=>x.id===view.pid)
    || {id:null, name:'', start:30000, kaeshi:30000, uma:[30,10,-10,-30], oka:0, tieRank:'split', kyotakuToTop:false};
  return `<div class="card">
    <label>名称</label><input type="text" id="r_name" value="${esc(p.name)}">
    <div class="row">
      <div><label>配給原点</label><input type="number" id="r_start" value="${p.start}" step="1000"></div>
      <div><label>返し点</label><input type="number" id="r_kaeshi" value="${p.kaeshi}" step="1000"></div>
    </div>
    <label>順位点(1着〜4着)</label>
    <div class="row">${[0,1,2,3].map(i=>`<input type="number" id="r_uma${i}" value="${p.uma[i]}">`).join('')}</div>
    <label>オカ(トップに加算P)</label><input type="number" id="r_oka" value="${p.oka}">
    <label>半荘内同点時</label>
    <div class="seg" id="r_tie">
      <button data-m="split" class="${p.tieRank==='split'?'on':''}">順位点折半</button>
      <button data-m="seat" class="${p.tieRank==='seat'?'on':''}">起家に近い方が上位</button>
    </div>
    <label>供託残り</label>
    <div class="seg" id="r_kyo">
      <button data-m="no" class="${!p.kyotakuToTop?'on':''}">別扱い(場から除外)</button>
      <button data-m="top" class="${p.kyotakuToTop?'on':''}">トップ取り</button>
    </div>
    <button class="primary" data-act="savePreset">保存</button>
    ${p.id?'<button class="secondary danger" data-act="delPreset">削除</button>':''}
  </div>`;
}

/* ================= オーラス判定(入力画面) ================= */
function vFinal(){
  const e = ev(); const pr = preset(e.presetId);
  if(!e.finalHand) e.finalHand = {order:e.playerIds.slice(), raws:['','','',''], kyotaku:0, honba:0, dealer:3, target:e.passCount};
  const f = e.finalHand;
  const rows = [0,1,2,3].map(i=>{
    const opts = e.playerIds.map(pid=>`<option value="${pid}" ${pid===f.order[i]?'selected':''}>${esc(pname(pid))}</option>`).join('');
    return `<div class="row" style="margin-top:6px">
      <select id="fh_p${i}" class="fhsel" style="flex:1.2">${opts}</select>
      <input type="number" id="fh_v${i}" class="fhnum" inputmode="numeric" step="100" placeholder="現在素点" value="${f.raws[i]??''}">
      <button class="small secondary" data-act="fhsign" data-i="${i}" style="flex:0 0 40px;width:auto;margin:0;padding:6px 0">±</button>
    </div>`;
  }).join('');
  const dOpts = [0,1,2,3].map(i=>`<option value="${i}" ${i===Number(f.dealer)?'selected':''}>${esc(pname(f.order[i]))}</option>`).join('');
  return `<div class="card">
    <h2>最終局の状況 <span class="badge">${esc(pr.name)}</span></h2>
    <div class="cond-note">上から起家→南→西→北(開局時の席順)。この局開始時点の持ち点を入力。
    リーチ者は1,000点引いた持ち点にして、その分を供託に足してください。南4局なら親は通常4番目です。</div>
    ${rows}
    <div class="row" style="margin-top:8px">
      <div style="flex:1"><label>供託(点)</label><input type="number" id="fh_kyo" class="fhnum" inputmode="numeric" step="1000" value="${f.kyotaku||0}"></div>
      <div style="flex:0.7"><label>本場</label><input type="number" id="fh_honba" class="fhnum" inputmode="numeric" step="1" value="${f.honba||0}"></div>
      <div style="flex:1.2"><label>親</label><select id="fh_dealer" class="fhsel">${dOpts}</select></div>
    </div>
  </div>
  <div id="fh_out">${finalResults(e)}</div>
  <button class="primary no-copy" data-act="copyMode">📝 転記モード(手書き用表示)</button>`;
}
function readFinal(){
  const e = ev(); const f = e.finalHand;
  f.order   = [0,1,2,3].map(i=>document.getElementById('fh_p'+i).value);
  f.raws    = [0,1,2,3].map(i=>document.getElementById('fh_v'+i).value);
  f.kyotaku = document.getElementById('fh_kyo').value;
  f.honba   = document.getElementById('fh_honba').value;
  f.dealer  = document.getElementById('fh_dealer').value;
  save();
}
function refreshFinalOut(){
  document.getElementById('fh_out').innerHTML = finalResults(ev());
  bind();
}

/* ================= イベントバインド ================= */
function bind(){
  document.querySelectorAll('.fhnum').forEach(el=> el.onchange = ()=>{ readFinal(); refreshFinalOut(); });
  document.querySelectorAll('.fhsel').forEach(el=> el.onchange = ()=>{ readFinal(); render(); });
  document.querySelectorAll('.seg').forEach(seg=>{
    seg.querySelectorAll('button').forEach(b=> b.onclick = ()=>{
      seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      if(seg.id==='f_mode'){
        document.getElementById('tourOpts').style.display   = b.dataset.m==='tournament' ? '' : 'none';
        document.getElementById('leagueOpts').style.display = b.dataset.m==='league' ? '' : 'none';
        document.getElementById('tableOpts').style.display  = b.dataset.m==='table' ? '' : 'none';
        document.getElementById('borderOpts').style.display = b.dataset.m==='border' ? '' : 'none';
      }
      if(seg.id==='g_type'){ const e=ev(); const g=e.games.find(g=>g.round===view.round);
        // 切替時に入力タイプだけ変えて再描画
        if(g) upsertGame(e, {...g, inputType:b.dataset.m});
        else { const ng = defaultGame(e, view.round); ng.inputType = b.dataset.m; e.games.push(ng); }
        render();
      }
    });
  });
  [0,1,2,3].forEach(i=>{
    const s = document.getElementById('f_p'+i);
    if(s) s.onchange = ()=>{ if(s.value==='__new__') quickAddPlayer(s); else refreshSelf(); };
    const gs = document.getElementById('g_p'+i);
    if(gs && gs.querySelector('option[value="__new__"]')) gs.onchange = ()=>{ if(gs.value==='__new__') quickAddPlayer(gs); };
  });
  const ls = document.getElementById('f_lself');
  if(ls) ls.onchange = ()=>{ if(ls.value==='__new__') quickAddPlayer(ls); };
  const lp = document.getElementById('lg_plot');
  if(lp) lp.onchange = ()=>{ view.plotId = lp.value; render(); };
  document.querySelectorAll('.tset').forEach(el=> el.onchange = ()=>{
    const e = ev();
    e.selfName = document.getElementById('t_self').value.trim();
    e.promote  = Number(document.getElementById('t_promote').value) || null;
    e.promote2 = Number(document.getElementById('t_promote2').value) || null;
    e.stay     = Number(document.getElementById('t_stay').value) || null;
    save(); render();
  });
  const rv = document.getElementById('t_rival');
  if(rv) rv.onchange = ()=>{ view.rival = rv.value; render(); };
  if(document.getElementById('f_self')) refreshSelf();
  const cme = document.getElementById('c_me');
  if(cme) cme.onchange = ()=>{ view.meId = cme.value; render(); };
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.onclick = (evt)=>{ evt.stopPropagation(); act(el.dataset, el); };
  });
}
function act(d, el){
  const A = d.act;
  if(A==='newEvent') go({name:'newEvent'});
  else if(A==='createEvent') createEvent();
  else if(A==='openEvent'){ const e = S.events.find(x=>x.id===d.id);
    go({name:evView(e), evId:e.id}); }
  else if(A==='openGame') go({name:'game', evId:view.evId, round:Number(d.r)});
  else if(A==='sign'){
    const inp = document.getElementById('g_v'+d.i);
    if(inp.value !== '' && !isNaN(Number(inp.value))) inp.value = String(-Number(inp.value));
    inp.focus();
  }
  else if(A==='saveGame') saveGame();
  else if(A==='importTable'){
    const txt = document.getElementById('t_import').value;
    const parsed = parseLeagueRows(txt);
    if(!parsed.length){ alert('取り込める行が見つかりませんでした。HPの表をそのままコピーするか、「名前 12.3 ▲5.0」の形式で入力してください。'); return; }
    const mode = document.querySelector('#t_imode .on').dataset.m;
    importRows(ev(), parsed, mode);
    save(); render();
  }
  else if(A==='delRow'){ const e=ev(); e.rows = e.rows.filter(r=>r.name!==d.n); save(); render(); }
  else if(A==='clearRows'){ if(confirm('順位表を全て消去しますか?')){ ev().rows = []; save(); render(); } }
  else if(A==='delGame'){
    if(confirm('この半荘を削除しますか?')){
      const e = ev();
      e.games = e.games.filter(g=>g.round!==view.round);
      e.games.sort((a,b)=>a.round-b.round).forEach((g,i)=>g.round=i+1);
      save(); back();
    }
  }
  else if(A==='cond') go({name:'cond', evId:view.evId});
  else if(A==='final') go({name:'final', evId:view.evId});
  else if(A==='fhsign'){
    const inp = document.getElementById('fh_v'+d.i);
    if(inp.value !== '' && !isNaN(Number(inp.value))) inp.value = String(-Number(inp.value));
    readFinal(); refreshFinalOut();
  }
  else if(A==='fhtarget'){ ev().finalHand.target = Number(d.t); save(); refreshFinalOut(); }
  else if(A==='copyMode'){
    document.body.classList.add('copy-mode');
    const off = ()=>{ document.body.classList.remove('copy-mode'); document.body.removeEventListener('click', off, true); };
    setTimeout(()=> document.body.addEventListener('click', off, true), 300);
  }
  else if(A==='delEvent'){ if(confirm('この大会を削除しますか?')){ S.events = S.events.filter(x=>x.id!==view.evId); save(); hist.length=0; go({name:'home'},false);} }
  else if(A==='addPlayer') go({name:'playerEdit', pid:null});
  else if(A==='editPlayer') go({name:'playerEdit', pid:d.id});
  else if(A==='savePlayer'){
    const name = document.getElementById('p_name').value.trim();
    if(!name){ alert('名前を入力してください'); return; }
    let p = player(view.pid);
    if(!p){ p = {id:uid()}; S.players.push(p); }
    p.name = name; p.kana = document.getElementById('p_kana').value.trim();
    p.org = document.getElementById('p_org').value; p.memo = document.getElementById('p_memo').value;
    if(document.getElementById('p_self').checked) S.selfId = p.id;
    else if(S.selfId===p.id) S.selfId = null;
    save(); back();
  }
  else if(A==='delPlayer'){
    const used = S.events.some(e=> (e.playerIds||[]).includes(view.pid) || (e.games||[]).some(g=>g.order.includes(view.pid)));
    if(used){ alert('大会記録があるプレイヤーは削除できません'); return; }
    if(confirm('削除しますか?')){ S.players = S.players.filter(p=>p.id!==view.pid); save(); back(); }
  }
  else if(A==='newPreset') go({name:'presetEdit', pid:null});
  else if(A==='editPreset') go({name:'presetEdit', pid:d.id});
  else if(A==='savePreset'){
    let p = S.customPresets.find(x=>x.id===view.pid);
    if(!p){ p = {id:'c_'+uid()}; S.customPresets.push(p); }
    p.name = document.getElementById('r_name').value.trim()||'カスタム';
    p.start = Number(document.getElementById('r_start').value);
    p.kaeshi = Number(document.getElementById('r_kaeshi').value);
    p.uma = [0,1,2,3].map(i=>Number(document.getElementById('r_uma'+i).value));
    p.oka = Number(document.getElementById('r_oka').value);
    p.tieRank = document.querySelector('#r_tie .on').dataset.m;
    p.kyotakuToTop = document.querySelector('#r_kyo .on').dataset.m==='top';
    save(); back();
  }
  else if(A==='delPreset'){
    if(S.events.some(e=>e.presetId===view.pid)){ alert('このルールを使う大会があるため削除できません'); return; }
    if(confirm('削除しますか?')){ S.customPresets = S.customPresets.filter(x=>x.id!==view.pid); save(); back(); }
  }
  else if(A==='saveTotal'){ ev().myTotal = Number(document.getElementById('b_total').value)||0; save(); render(); }
  else if(A==='addBorder'){
    const v = Number(document.getElementById('b_value').value);
    if(isNaN(v)){ alert('ボーダー値を入力してください'); return; }
    ev().borders.push({label:document.getElementById('b_label').value.trim(), value:v});
    save(); render();
  }
  else if(A==='delBorder'){ ev().borders.splice(Number(d.i),1); save(); render(); }
  else if(A==='export'){
    const blob = new Blob([JSON.stringify(S,null,1)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `joken-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  }
  else if(A==='import'){
    const f = document.getElementById('importFile');
    f.onchange = ()=>{
      const file = f.files[0]; if(!file) return;
      const rd = new FileReader();
      rd.onload = ()=>{
        try{
          const d = JSON.parse(rd.result);
          if(!d.players || !d.events) throw 0;
          if(confirm('現在のデータを読み込んだ内容で置き換えます。よろしいですか?')){ S = d; save(); render(); alert('復元しました'); }
        }catch(e){ alert('ファイルを読み込めませんでした'); }
      };
      rd.readAsText(file);
    };
    f.click();
  }
}
render();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
